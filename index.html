<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>3D Moto Multiplayer Game</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    background:#000;
    font-family:Arial, Helvetica, sans-serif;
}

#ui{
    position:absolute;
    top:15px;
    left:15px;
    z-index:100;
    color:white;
    background:rgba(0,0,0,0.55);
    padding:16px;
    border-radius:18px;
    border:1px solid rgba(255,255,255,0.2);
    backdrop-filter:blur(10px);
    width:260px;
}

#title{
    font-size:26px;
    font-weight:bold;
    margin-bottom:10px;
    color:#00e5ff;
}

.stat{
    margin:8px 0;
    font-size:16px;
}

#startBtn{
    margin-top:14px;
    width:100%;
    padding:12px;
    border:none;
    border-radius:12px;
    background:linear-gradient(90deg,#00e5ff,#2979ff);
    color:white;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
}

#controls{
    margin-top:12px;
    line-height:1.6;
    font-size:13px;
    opacity:0.85;
}

#loading{
    position:absolute;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
    background:black;
    z-index:999;
    font-size:28px;
    letter-spacing:3px;
}

canvas{
    display:block;
}
</style>

<!-- FIXED VERSION -->
<!-- Uses classic non-module scripts instead of ES module imports -->
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

</head>
<body>

<div id="loading">LOADING GAME...</div>

<div id="usernameModal" style="position:absolute;inset:0;background:rgba(0,0,0,0.92);display:flex;align-items:center;justify-content:center;z-index:2000;">

    <div style="width:340px;background:#0b0f1a;border:1px solid rgba(255,255,255,0.15);border-radius:22px;padding:24px;color:white;text-align:center;box-shadow:0 0 40px rgba(0,191,255,0.25);">

        <div style="font-size:28px;font-weight:bold;color:#00e5ff;margin-bottom:12px;">
            ENTER USERNAME
        </div>

        <div style="opacity:0.8;font-size:14px;margin-bottom:18px;">
            Choose your rider profile name
        </div>

        <input id="startupUsernameInput" type="text" maxlength="14" placeholder="Username"
        style="width:100%;padding:14px;border:none;border-radius:14px;background:#111827;color:white;font-size:16px;outline:none;">

        <button id="startupJoinBtn"
        style="margin-top:18px;width:100%;padding:14px;border:none;border-radius:14px;background:linear-gradient(90deg,#00bfff,#2979ff);color:white;font-size:16px;font-weight:bold;cursor:pointer;">
        JOIN RACE
        </button>

    </div>

</div>

<div id="ui" style="min-width:220px;min-height:240px;resize:both;overflow:auto;">
    <div id="title">MOTO XTREME</div>

    <div class="stat">Speed: <span id="speed">0</span> km/h</div>
    <div class="stat">Players: <span id="players">4</span></div>
    <div class="stat">Lap: <span id="lap">1</span></div>

    <button id="startBtn">START GAME</button>

    <div id="controls">
        W = Accelerate<br>
        S = Brake<br>
        A / D = Turn<br>
        SHIFT = Nitro<br>
        SPACE = Drift
    </div>

<div id="uiResizeHandle" style="position:absolute;right:6px;bottom:6px;width:14px;height:14px;background:#00bfff;border-radius:4px;opacity:0.7;"></div>
</div>

<div id="profileBox" style="position:absolute;left:290px;top:15px;width:240px;background:rgba(0,0,0,0.55);border:1px solid rgba(255,255,255,0.2);border-radius:18px;backdrop-filter:blur(10px);padding:14px;color:white;z-index:100;">

    <div style="font-size:20px;font-weight:bold;color:#00e5ff;margin-bottom:10px;">
        RIDER PROFILE
    </div>

    <input id="usernameInput" type="text" maxlength="14" placeholder="Enter username"
    style="width:100%;padding:10px;border:none;border-radius:10px;background:#111;color:white;outline:none;margin-bottom:10px;">

    <button id="saveProfileBtn"
    style="width:100%;padding:10px;border:none;border-radius:10px;background:#00bfff;color:white;font-weight:bold;cursor:pointer;">
    SAVE PROFILE
    </button>

    <div id="profileInfo" style="margin-top:12px;font-size:14px;line-height:1.7;opacity:0.9;">
        Username: Guest<br>
        Rank: Rookie Rider<br>
        Wins: 0
    </div>
</div>

<div id="chatBox" style="position:absolute;right:15px;top:15px;width:340px;height:420px;min-width:260px;min-height:260px;resize:both;background:rgba(0,0,0,0.55);border:1px solid rgba(255,255,255,0.2);border-radius:18px;backdrop-filter:blur(10px);display:flex;flex-direction:column;z-index:100;color:white;overflow:hidden;">

    <div id="chatResizeHandle" style="position:absolute;right:6px;bottom:6px;width:14px;height:14px;background:#00bfff;border-radius:4px;opacity:0.7;"></div>

    <div style="padding:12px;font-size:20px;font-weight:bold;color:#00e5ff;border-bottom:1px solid rgba(255,255,255,0.15);">
        LIVE CHAT
    </div>

    <div id="chatMessages" style="flex:1;padding:10px;overflow-y:auto;font-size:14px;"></div>

    <div style="display:flex;padding:10px;gap:8px;background:rgba(255,255,255,0.04);">
        <input id="chatInput" type="text" placeholder="Type message..."
        style="flex:1;padding:10px;border:none;border-radius:10px;background:#111;color:white;outline:none;">

        <button id="sendBtn"
        style="padding:10px 14px;border:none;border-radius:10px;background:#00bfff;color:white;font-weight:bold;cursor:pointer;">
        Send
        </button>
    </div>
</div>

<script>
window.addEventListener('load',()=>{

const loading = document.getElementById('loading');
loading.style.display = 'none';

// SCENE
const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x000000, 80, 500);

// CAMERA
const camera = new THREE.PerspectiveCamera(
    75,
    window.innerWidth / window.innerHeight,
    0.1,
    2000
);

camera.position.set(0,8,-16);

// RENDERER
const renderer = new THREE.WebGLRenderer({
    antialias:true
});

renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.2));
renderer.setSize(window.innerWidth, window.innerHeight);
// Balanced graphics for Chromebook + HD look
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

// LIGHTS
const hemi = new THREE.HemisphereLight(0x66ccff,0x080820,1.5);
scene.add(hemi);

const sun = new THREE.DirectionalLight(0xffffff,2.5);
sun.shadow.mapSize.width = 1024;
sun.shadow.mapSize.height = 1024;
sun.position.set(50,100,20);
sun.castShadow = true;
scene.add(sun);

// SKY
const sky = new THREE.Mesh(
    new THREE.SphereGeometry(1000,16,16),
    new THREE.MeshBasicMaterial({
        color:0x050816,
        side:THREE.BackSide
    })
);
scene.add(sky);

// GROUND
const ground = new THREE.Mesh(
    new THREE.PlaneGeometry(2000,2000),
    new THREE.MeshStandardMaterial({
        color:0x111111,
        roughness:1
    })
);

ground.rotation.x = -Math.PI/2;
ground.receiveShadow = true;
scene.add(ground);

// CRASH WALLS
const crashWalls = [];

function createWall(x,z,w,d){

    const wall = new THREE.Mesh(
        new THREE.BoxGeometry(w,6,d),
        new THREE.MeshStandardMaterial({
            color:0x444444,
            metalness:0.7,
            roughness:0.4,
            emissive:0x111111
        })
    );

    wall.position.set(x,3,z);
    wall.castShadow = true;
    wall.receiveShadow = true;

    scene.add(wall);
    crashWalls.push(wall);
}

createWall(0,125,260,6);
createWall(0,-125,260,6);
createWall(125,0,6,260);
createWall(-125,0,6,260);

// TRACK
const track = new THREE.Mesh(
    new THREE.RingGeometry(80,120,48),
    new THREE.MeshStandardMaterial({
        color:0x2a2a2a,
        roughness:0.8,
        metalness:0.2
    })
);

track.rotation.x = -Math.PI/2;
track.receiveShadow = true;
scene.add(track);

// GLOW EFFECT
const glowLight = new THREE.PointLight(0x00e5ff, 4, 120);
glowLight.position.set(0,30,0);
scene.add(glowLight);

// TRACK LIGHTS
for(let i=0;i<28;i++){
    const angle = (i/40) * Math.PI * 2;

    const light = new THREE.PointLight(0x00e5ff,2,20);

    light.position.set(
        Math.cos(angle)*100,
        3,
        Math.sin(angle)*100
    );

    scene.add(light);

    const orb = new THREE.Mesh(
        new THREE.SphereGeometry(1,8,8),
        new THREE.MeshBasicMaterial({color:0x00e5ff})
    );

    orb.position.copy(light.position);
    scene.add(orb);
}

// BIKE
const bike = new THREE.Group();

// NEON TRAIL EFFECT
const trailGeometry = new THREE.BufferGeometry();
const trailMaterial = new THREE.LineBasicMaterial({
    color:0x00e5ff
});

const trailPoints = [
    new THREE.Vector3(0,0,0),
    new THREE.Vector3(0,0,-2)
];

trailGeometry.setFromPoints(trailPoints);

const neonTrail = new THREE.Line(trailGeometry, trailMaterial);
neonTrail.position.set(0,-0.5,-3);
bike.add(neonTrail);

// Main body
const body = new THREE.Mesh(
    new THREE.BoxGeometry(2,1,5),
    new THREE.MeshStandardMaterial({
        color:0xff2222,
        metalness:1,
        roughness:0.15,
        emissive:0x220000,
        emissiveIntensity:0.4
    })
);
body.castShadow = true;
bike.add(body);

// Front fairing
const frontFairing = new THREE.Mesh(
    new THREE.BoxGeometry(1.8,0.9,1.5),
    new THREE.MeshStandardMaterial({
        color:0xdd0000,
        metalness:1,
        roughness:0.12
    })
);
frontFairing.position.set(0,0.2,1.8);
frontFairing.castShadow = true;
bike.add(frontFairing);

// Seat
const seat = new THREE.Mesh(
    new THREE.BoxGeometry(1.3,0.4,1.6),
    new THREE.MeshStandardMaterial({
        color:0x111111,
        roughness:0.9,
        metalness:0.1
    })
);
seat.position.set(0,0.55,-0.4);
seat.castShadow = true;
bike.add(seat);

// Fuel tank
const tank = new THREE.Mesh(
    new THREE.CylinderGeometry(0.65,0.8,1.6,16),
    new THREE.MeshStandardMaterial({
        color:0xff3333,
        metalness:1,
        roughness:0.18
    })
);
tank.rotation.z = Math.PI/2;
tank.position.set(0,0.45,0.3);
tank.castShadow = true;
bike.add(tank);

// Handlebars
const handleBar = new THREE.Mesh(
    new THREE.CylinderGeometry(0.08,0.08,2.2,10),
    new THREE.MeshStandardMaterial({
        color:0xc0c0c0,
        metalness:1,
        roughness:0.2
    })
);
handleBar.rotation.z = Math.PI/2;
handleBar.position.set(0,0.7,2);
handleBar.castShadow = true;
bike.add(handleBar);

// Exhaust pipe
const exhaust = new THREE.Mesh(
    new THREE.CylinderGeometry(0.12,0.18,2.5,12),
    new THREE.MeshStandardMaterial({
        color:0x999999,
        metalness:1,
        roughness:0.2,
        emissive:0x222222
    })
);
exhaust.rotation.x = Math.PI/2;
exhaust.position.set(-0.8,-0.1,-0.7);
exhaust.castShadow = true;
bike.add(exhaust);

function createWheel(){
    const wheelGroup = new THREE.Group();

    const tire = new THREE.Mesh(
        new THREE.CylinderGeometry(1,1,0.8,18),
        new THREE.MeshStandardMaterial({
            color:0x090909,
            roughness:1
        })
    );

    tire.rotation.z = Math.PI/2;
    tire.castShadow = true;
    wheelGroup.add(tire);

    const rim = new THREE.Mesh(
        new THREE.CylinderGeometry(0.65,0.65,0.82,16),
        new THREE.MeshStandardMaterial({
            color:0xc0c0c0,
            metalness:1,
            roughness:0.15
        })
    );

    rim.rotation.z = Math.PI/2;
    wheelGroup.add(rim);

    return wheelGroup;
}

const frontWheel = createWheel();
frontWheel.position.set(0,-0.7,2.2);
bike.add(frontWheel);

const rearWheel = createWheel();
rearWheel.position.set(0,-0.7,-2.2);
bike.add(rearWheel);

// Engine block
const engine = new THREE.Mesh(
    new THREE.BoxGeometry(1.2,0.9,1.3),
    new THREE.MeshStandardMaterial({
        color:0x555555,
        metalness:1,
        roughness:0.25
    })
);
engine.position.set(0,-0.1,0);
engine.castShadow = true;
bike.add(engine);

// Front windshield
const windshield = new THREE.Mesh(
    new THREE.BoxGeometry(1.2,0.6,0.1),
    new THREE.MeshPhysicalMaterial({
        color:0x88ccff,
        transparent:true,
        opacity:0.45,
        roughness:0,
        transmission:1,
        metalness:0
    })
);

windshield.position.set(0,0.8,2.3);
windshield.rotation.x = -0.35;
windshield.castShadow = true;
bike.add(windshield);

// Side panels
for(let side=-1; side<=1; side+=2){

    const panel = new THREE.Mesh(
        new THREE.BoxGeometry(0.15,0.9,2.8),
        new THREE.MeshStandardMaterial({
            color:0xaa0000,
            metalness:1,
            roughness:0.18,
            emissive:0x220000,
            emissiveIntensity:0.3
        })
    );

    panel.position.set(side*0.95,0.05,0.1);
    panel.castShadow = true;
    bike.add(panel);
}

// Brake light
const brakeLight = new THREE.PointLight(0xff0000,2,15);
brakeLight.position.set(0,0.2,-3);
bike.add(brakeLight);

const brakeMesh = new THREE.Mesh(
    new THREE.BoxGeometry(0.5,0.2,0.2),
    new THREE.MeshBasicMaterial({
        color:0xff2222
    })
);

brakeMesh.position.set(0,0.2,-2.6);
bike.add(brakeMesh);

// Front forks
for(let side=-1; side<=1; side+=2){

    const fork = new THREE.Mesh(
        new THREE.CylinderGeometry(0.07,0.07,2.3,10),
        new THREE.MeshStandardMaterial({
            color:0xcccccc,
            metalness:1,
            roughness:0.15
        })
    );

    fork.position.set(side*0.45,-0.1,1.7);
    fork.rotation.x = 0.15;
    fork.castShadow = true;

    bike.add(fork);
}

// Rear suspension
const suspension = new THREE.Mesh(
    new THREE.CylinderGeometry(0.08,0.08,1.4,10),
    new THREE.MeshStandardMaterial({
        color:0xffff00,
        metalness:0.8,
        roughness:0.25,
        emissive:0x444400
    })
);

suspension.rotation.x = 0.7;
suspension.position.set(0,-0.1,-1.6);
suspension.castShadow = true;

bike.add(suspension);

bike.position.y = 1;
scene.add(bike);

// HEADLIGHTS
const headLightLeft = new THREE.PointLight(0xffffff,2,30);
headLightLeft.position.set(-0.7,0.3,2.8);
bike.add(headLightLeft);

const headLightRight = new THREE.PointLight(0xffffff,2,30);
headLightRight.position.set(0.7,0.3,2.8);
bike.add(headLightRight);

// BOOST LIGHT
const boostLight = new THREE.PointLight(0x2979ff,0,30);
boostLight.position.set(0,1,-3);
bike.add(boostLight);

// NEON UNDERGLOW
const underGlow = new THREE.PointLight(0xff0044,2,18);
underGlow.position.set(0,-1,0);
bike.add(underGlow);

// AI BIKES
const aiPlayers = [];

for(let i=0;i<3;i++){
    const enemy = bike.clone();

    enemy.children[0].castShadow = true;

    const enemyGlow = new THREE.PointLight(0x00ffcc,1.5,14);
    enemyGlow.position.set(0,-1,0);
    enemy.add(enemyGlow);

    enemy.children[0].material = new THREE.MeshStandardMaterial({
        color:new THREE.Color(`hsl(${i*120},90%,55%)`),
        metalness:0.7,
        roughness:0.25
    });

    enemy.userData.angle = Math.random() * Math.PI * 2;
    enemy.userData.speed = 0.004 + Math.random() * 0.004;

    aiPlayers.push(enemy);
    scene.add(enemy);
}

// BUILDINGS
for(let i=0;i<90;i++){

    const h = 10 + Math.random() * 90;

    const building = new THREE.Mesh(
        new THREE.BoxGeometry(10,h,10),
        new THREE.MeshStandardMaterial({
            color:0x0f172a,
            emissive:0x112244,
            emissiveIntensity:0.3
        })
    );

    const angle = Math.random() * Math.PI * 2;
    const dist = 180 + Math.random() * 450;

    building.position.set(
        Math.cos(angle) * dist,
        h/2,
        Math.sin(angle) * dist
    );

    building.castShadow = true;
    building.receiveShadow = true;

    scene.add(building);
}

// STARS
const starsGeometry = new THREE.BufferGeometry();
const starVertices = [];

for(let i=0;i<700;i++){
    starVertices.push((Math.random()-0.5)*2000);
    starVertices.push(Math.random()*500);
    starVertices.push((Math.random()-0.5)*2000);
}

starsGeometry.setAttribute(
    'position',
    new THREE.Float32BufferAttribute(starVertices,3)
);

const stars = new THREE.Points(
    starsGeometry,
    new THREE.PointsMaterial({
        color:0xffffff,
        size:0.8
    })
);

scene.add(stars);

// UI
// SAVEABLE RESIZABLE MENU
const uiBox = document.getElementById('ui');

const savedUIWidth = localStorage.getItem('ui_width');
const savedUIHeight = localStorage.getItem('ui_height');
const savedUILeft = localStorage.getItem('ui_left');
const savedUITop = localStorage.getItem('ui_top');

if(savedUIWidth) uiBox.style.width = savedUIWidth;
if(savedUIHeight) uiBox.style.height = savedUIHeight;
if(savedUILeft) uiBox.style.left = savedUILeft;
if(savedUITop) uiBox.style.top = savedUITop;

const uiResizeObserver = new ResizeObserver(()=>{

    localStorage.setItem('ui_width', uiBox.style.width);
    localStorage.setItem('ui_height', uiBox.style.height);
    localStorage.setItem('ui_left', uiBox.style.left);
    localStorage.setItem('ui_top', uiBox.style.top);
});

uiResizeObserver.observe(uiBox);

// MENU DRAGGING
let draggingMenu = false;
let dragOffsetX = 0;
let dragOffsetY = 0;

uiBox.addEventListener('mousedown',(e)=>{

    if(e.target.id === 'startBtn') return;

    draggingMenu = true;

    dragOffsetX = e.clientX - uiBox.offsetLeft;
    dragOffsetY = e.clientY - uiBox.offsetTop;
});

window.addEventListener('mousemove',(e)=>{

    if(!draggingMenu) return;

    uiBox.style.left = (e.clientX - dragOffsetX) + 'px';
    uiBox.style.top = (e.clientY - dragOffsetY) + 'px';

    localStorage.setItem('ui_left', uiBox.style.left);
    localStorage.setItem('ui_top', uiBox.style.top);
});

window.addEventListener('mouseup',()=>{
    draggingMenu = false;
});

const speedUI = document.getElementById('speed');
const lapUI = document.getElementById('lap');
const startBtn = document.getElementById('startBtn');

// CONTROLS
const keys = {};

window.addEventListener('keydown',e=>{
    keys[e.key.toLowerCase()] = true;
});

window.addEventListener('keyup',e=>{
    keys[e.key.toLowerCase()] = false;
});

let speed = 0;
let crashed = false;
let crashTimer = 0;
let angle = 0;
let started = false;
let lap = 1;
let lapCooldown = false;

startBtn.onclick = ()=>{
    started = true;
    startBtn.innerText = 'RACING...';
};

// PEER-TO-PEER MULTIPLAYER
// No dedicated server needed
// Uses BroadcastChannel for same-browser/device multiplayer
// and WebRTC-ready structure for future upgrades

const multiplayerPlayers = {};
const localPlayerId = 'player_' + Math.random().toString(36).substring(2,9);
let username = localStorage.getItem('moto_username') || '';

const channel = new BroadcastChannel('moto_multiplayer');

// PROFILE SYSTEM
const usernameInput = document.getElementById('usernameInput');
const saveProfileBtn = document.getElementById('saveProfileBtn');
const profileInfo = document.getElementById('profileInfo');

usernameInput.value = username;

const usernameModal = document.getElementById('usernameModal');
const startupUsernameInput = document.getElementById('startupUsernameInput');
const startupJoinBtn = document.getElementById('startupJoinBtn');

startupUsernameInput.value = username;

function openUsernameModal(){
    usernameModal.style.display = 'flex';
}

function closeUsernameModal(){
    usernameModal.style.display = 'none';
}

function setupUsername(){

    const newName = startupUsernameInput.value.trim();

    if(newName.length < 2){
        startupUsernameInput.style.border = '2px solid red';
        return;
    }

    username = newName;

    localStorage.setItem('moto_username', username);

    usernameInput.value = username;

    updateProfile();

    closeUsernameModal();
}

startupJoinBtn.onclick = setupUsername;

startupUsernameInput.addEventListener('keydown',e=>{
    if(e.key === 'Enter') setupUsername();
});

if(!username){
    openUsernameModal();
}
else{
    closeUsernameModal();
}

function updateProfile(){
    profileInfo.innerHTML = `
        Username: ${username}<br>
        Rank: Rookie Rider<br>
        Wins: 0
    `;
}

updateProfile();

saveProfileBtn.onclick = ()=>{

    const newName = usernameInput.value.trim();

    if(newName.length < 2) return;

    username = newName;

    localStorage.setItem('moto_username',username);

    updateProfile();

    addChatMessage('SYSTEM','Profile updated!',false);
};

// LIVE CHAT
const savedChat = JSON.parse(localStorage.getItem('moto_chat_history') || '[]');
const chatMessages = document.getElementById('chatMessages');
const chatInput = document.getElementById('chatInput');
const sendBtn = document.getElementById('sendBtn');

function saveChatHistory(){

    const history = [];

    document.querySelectorAll('#chatMessages div').forEach(msg=>{

        history.push({
            html: msg.innerHTML,
            background: msg.style.background
        });
    });

    // Save last 120 chat messages
    localStorage.setItem(
        'moto_chat_history',
        JSON.stringify(history.slice(-120))
    );
}

function addChatMessage(name,message,isLocal=false){

    const msg = document.createElement('div');

    msg.style.marginBottom = '8px';
    msg.style.padding = '8px';
    msg.style.borderRadius = '10px';
    msg.style.background = isLocal
        ? 'rgba(0,191,255,0.25)'
        : 'rgba(255,255,255,0.08)';

    msg.innerHTML = `<b>${name}:</b> ${message}`;

    chatMessages.appendChild(msg);

    saveChatHistory();

    chatMessages.scrollTop = chatMessages.scrollHeight;
}

function sendChat(){

    const text = chatInput.value.trim();

    if(!text) return;

    addChatMessage(username,text,true);

    channel.postMessage({
        type:'chat',
        id:localPlayerId,
        text:text,
        username:username
    });

    chatInput.value = '';
}

// Restore saved messages
savedChat.forEach(data=>{

    const msg = document.createElement('div');

    msg.style.marginBottom = '8px';
    msg.style.padding = '8px';
    msg.style.borderRadius = '10px';
    msg.style.background = data.background || 'rgba(255,255,255,0.08)';

    msg.innerHTML = data.html || data;

    chatMessages.appendChild(msg);
});

chatMessages.scrollTop = chatMessages.scrollHeight;

// SAVE CHAT SIZE + POSITION
const chatBox = document.getElementById('chatBox');

const savedWidth = localStorage.getItem('chat_width');
const savedTop = localStorage.getItem('chat_top');
const savedRight = localStorage.getItem('chat_right');
const savedHeight = localStorage.getItem('chat_height');

if(savedWidth) chatBox.style.width = savedWidth;
if(savedHeight) chatBox.style.height = savedHeight;
if(savedTop) chatBox.style.top = savedTop;
if(savedRight) chatBox.style.right = savedRight;

const resizeObserver = new ResizeObserver(()=>{

    localStorage.setItem('chat_width',chatBox.style.width);
    localStorage.setItem('chat_height',chatBox.style.height);
    localStorage.setItem('chat_top',chatBox.style.top);
    localStorage.setItem('chat_right',chatBox.style.right);
});

resizeObserver.observe(chatBox);

sendBtn.onclick = sendChat;

chatInput.addEventListener('keydown',e=>{
    if(e.key === 'Enter') sendChat();
});

function createRemotePlayer(id,color=0x00ff99){

    if(multiplayerPlayers[id]) return;

    const remoteBike = bike.clone();

    remoteBike.children[0].material = new THREE.MeshStandardMaterial({
        color:color,
        metalness:0.7,
        roughness:0.3
    });

    remoteBike.position.y = 1;

    multiplayerPlayers[id] = remoteBike;

    scene.add(remoteBike);
}

channel.onmessage = (event)=>{

    const data = event.data;

    if(!data) return;

    // CHAT MESSAGES
    if(data.type === 'chat'){

        if(data.id !== localPlayerId){
            addChatMessage(data.username || data.id,data.text,false);
        }

        return;
    }

    if(data.id === localPlayerId) return;

    if(!multiplayerPlayers[data.id]){
        createRemotePlayer(
            data.id,
            Math.random() * 0xffffff
        );

        const nameTag = document.createElement('div');
        nameTag.id = 'tag_' + data.id;
        nameTag.style.position = 'absolute';
        nameTag.style.color = 'white';
        nameTag.style.fontSize = '12px';
        nameTag.style.pointerEvents = 'none';
        nameTag.style.fontWeight = 'bold';
        nameTag.innerText = data.username || 'Rider';

        document.body.appendChild(nameTag);
    }

    const player = multiplayerPlayers[data.id];

    player.position.set(data.x,data.y,data.z);
    player.rotation.y = data.rotation;

    const vector = player.position.clone();
    vector.project(camera);

    const x = (vector.x * 0.5 + 0.5) * window.innerWidth;
    const y = (-vector.y * 0.5 + 0.5) * window.innerHeight;

    const tag = document.getElementById('tag_' + data.id);

    if(tag){
        tag.style.left = x + 'px';
        tag.style.top = (y - 30) + 'px';
        tag.innerText = data.username || 'Rider';
    };
};

function syncPlayer(){

    channel.postMessage({
        type:'player',
        id:localPlayerId,
        x:bike.position.x,
        y:bike.position.y,
        z:bike.position.z,
        rotation:bike.rotation.y
    });
}

// TEST PLAYER
createRemotePlayer('demo_player',0x3399ff);

// SIMPLE TESTS
console.assert(scene instanceof THREE.Scene,'Scene failed');
console.assert(camera instanceof THREE.PerspectiveCamera,'Camera failed');
console.assert(renderer instanceof THREE.WebGLRenderer,'Renderer failed');
console.assert(bike.children.length >= 3,'Bike failed');
console.assert(typeof username === 'string','Username failed');
console.assert(typeof saveChatHistory === 'function','Chat save failed');
console.assert(uiBox instanceof HTMLElement,'Menu resize failed');

// GAME LOOP
function animate(){

    requestAnimationFrame(animate);

    if(started){

        if(keys['w']) speed += 0.02;
        if(keys['s']) speed -= 0.03;

        speed *= 0.98;

        speed = Math.max(-1, Math.min(3, speed));

        if(keys['a']) angle += 0.03;
        if(keys['d']) angle -= 0.03;

        if(keys['shift']){
            speed += 0.04;
            boostLight.intensity = 6;
        }
        else{
            boostLight.intensity *= 0.9;
        }

        bike.rotation.y = angle;

        bike.position.x += Math.sin(angle) * speed;
        bike.position.z += Math.cos(angle) * speed;

        frontWheel.rotation.x += speed;
        frontWheel.rotation.y = Math.sin(Date.now()*0.002) * 0.08;
        rearWheel.rotation.x += speed;

        // Dynamic bike lean
        bike.rotation.x = -speed * 0.03;

        // CRASH DETECTION
        crashed = false;

        crashWalls.forEach(wall=>{

            const dx = bike.position.x - wall.position.x;
            const dz = bike.position.z - wall.position.z;

            const hitX = Math.abs(dx) < (wall.geometry.parameters.width/2 + 2);
            const hitZ = Math.abs(dz) < (wall.geometry.parameters.depth/2 + 2);

            if(hitX && hitZ){

                crashed = true;
                crashTimer = 20;

                speed *= -0.4;

                bike.rotation.z = 1.2;

                // Crash sparks
                for(let i=0;i<6;i++){

                    const spark = new THREE.Mesh(
                        new THREE.SphereGeometry(0.2,6,6),
                        new THREE.MeshBasicMaterial({
                            color:0xffaa00
                        })
                    );

                    spark.position.copy(bike.position);

                    spark.position.x += (Math.random()-0.5)*2;
                    spark.position.y += Math.random()*2;
                    spark.position.z += (Math.random()-0.5)*2;

                    scene.add(spark);

                    setTimeout(()=>{
                        scene.remove(spark);
                    },300);
                }
            }
        });

        if(crashTimer > 0){
            crashTimer--;
        }
        else{
            bike.rotation.z *= 0.9;
        }

        // DRIFT
        if(keys[' ']){
            bike.rotation.z = Math.sin(Date.now()*0.02)*0.2;
        }
        else{
            bike.rotation.z *= 0.9;
        }

        // CAMERA FOLLOW
        camera.position.x = bike.position.x - Math.sin(angle)*14;
        camera.position.z = bike.position.z - Math.cos(angle)*14;
        camera.position.y = bike.position.y + 7;

        camera.lookAt(
            bike.position.x,
            bike.position.y + 2,
            bike.position.z
        );

        // Demo rider movement
        const demoPlayer = multiplayerPlayers['demo_player'];

        if(demoPlayer){
            const t = Date.now()*0.001;
            demoPlayer.position.x = Math.sin(t)*70;
            demoPlayer.position.z = Math.cos(t)*70;
            demoPlayer.rotation.y = t;
        }

        syncPlayer();

        // MOTORCYCLE COLLISIONS
        aiPlayers.forEach(ai=>{

            const dx = bike.position.x - ai.position.x;
            const dz = bike.position.z - ai.position.z;

            const distance = Math.sqrt(dx*dx + dz*dz);

            if(distance < 4){

                // Crash reaction
                speed *= -0.5;
                crashTimer = 25;

                bike.rotation.z = 1.1;
                ai.rotation.z = -1.1;

                // Push bikes apart
                bike.position.x += dx * 0.15;
                bike.position.z += dz * 0.15;

                ai.position.x -= dx * 0.08;
                ai.position.z -= dz * 0.08;

                // Crash sparks
                for(let i=0;i<10;i++){

                    const spark = new THREE.Mesh(
                        new THREE.SphereGeometry(0.15,5,5),
                        new THREE.MeshBasicMaterial({
                            color:0xffaa00
                        })
                    );

                    spark.position.set(
                        (bike.position.x + ai.position.x)/2,
                        1 + Math.random()*2,
                        (bike.position.z + ai.position.z)/2
                    );

                    scene.add(spark);

                    const velX = (Math.random()-0.5)*0.8;
                    const velZ = (Math.random()-0.5)*0.8;

                    const sparkInterval = setInterval(()=>{
                        spark.position.x += velX;
                        spark.position.z += velZ;
                        spark.position.y += 0.05;
                    },16);

                    setTimeout(()=>{
                        clearInterval(sparkInterval);
                        scene.remove(spark);
                    },400);
                }
            }
        });

        // AI MOVEMENT
        aiPlayers.forEach(ai=>{

            ai.userData.angle += ai.userData.speed;

            ai.position.x = Math.cos(ai.userData.angle)*100;
            ai.position.z = Math.sin(ai.userData.angle)*100;
            ai.position.y = 1;

            ai.rotation.y = -ai.userData.angle;
        });

        // LAP SYSTEM
        if(
            bike.position.z > 0 &&
            bike.position.x > 95 &&
            !lapCooldown
        ){
            lap++;
            lapUI.innerText = lap;
            lapCooldown = true;

            setTimeout(()=>{
                lapCooldown = false;
            },3000);
        }
    }

    speedUI.innerText = Math.floor(Math.abs(speed)*140);

    stars.rotation.y += 0.0004;

    // Reduce rendering cost on Chromebooks
// Peer-to-peer sync active

renderer.render(scene,camera);
}

animate();

// RESIZE
window.addEventListener('resize',()=>{
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth,window.innerHeight);
});

});
