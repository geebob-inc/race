
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neo Rider X</title>
<style>
html, body {
    margin: 0;
    overflow: hidden;
    background: black;
    font-family: Arial, sans-serif;
}

#ui {
    position: absolute;
    top: 15px;
    left: 15px;
    color: white;
    z-index: 10;
    font-size: 20px;
    text-shadow: 0 0 10px cyan;
}

#start {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: white;
    background: rgba(0,0,0,0.7);
    padding: 20px;
    border: 2px solid cyan;
    border-radius: 20px;
    text-align: center;
    z-index: 20;
}

button {
    padding: 12px 20px;
    border: none;
    border-radius: 10px;
    background: cyan;
    color: black;
    font-size: 18px;
    cursor: pointer;
}

canvas {
    display: block;
}
</style>
</head>
<body>

<div id="ui">
    Speed: <span id="speed">0</span> MPH<br>
    Distance: <span id="distance">0</span>
</div>

<div id="start">
    <h1>NEO RIDER X</h1>
    <p>WASD / Arrow Keys To Drive</p>
    <p>SHIFT = Boost</p>
    <button onclick="startGame()">START GAME</button>
</div>

<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.161/build/three.module.js';

let scene, camera, renderer;
let bike, road;
let speed = 0;
let maxSpeed = 3;
let distance = 0;
let ramps = [];
let worldObjects = [];
let gameStarted = false;

const keys = {};

init();
animate();

function init() {
    scene = new THREE.Scene();
    scene.fog = new THREE.Fog(0x000000, 20, 180);

    camera = new THREE.PerspectiveCamera(
        75,
        window.innerWidth / window.innerHeight,
        0.1,
        1000
    );

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    // Lighting
    const hemi = new THREE.HemisphereLight(0x00ffff, 0x111111, 1.4);
    scene.add(hemi);

    const light = new THREE.DirectionalLight(0xffffff, 2);
    light.position.set(20, 40, 20);
    light.castShadow = true;
    light.shadow.mapSize.width = 2048;
    light.shadow.mapSize.height = 2048;
    scene.add(light);

    // City glow
    const neon1 = new THREE.PointLight(0x00ffff, 10, 80);
    neon1.position.set(0, 20, -20);
    scene.add(neon1);

    const neon2 = new THREE.PointLight(0xff00ff, 10, 80);
    neon2.position.set(0, 15, 40);
    scene.add(neon2);

    // Road
    const roadGeo = new THREE.PlaneGeometry(20, 2000);
    const roadMat = new THREE.MeshStandardMaterial({
        color: 0x111111,
        metalness: 0.8,
        roughness: 0.2
    });

    road = new THREE.Mesh(roadGeo, roadMat);
    road.rotation.x = -Math.PI / 2;
    road.receiveShadow = true;
    scene.add(road);

    createRoadLines();
    createBike();
    createCity();
    createSky();
    createRamps();

    camera.position.set(0, 3, 8);

    window.addEventListener('resize', onResize);

    document.addEventListener('keydown', e => {
        keys[e.key.toLowerCase()] = true;
    });

    document.addEventListener('keyup', e => {
        keys[e.key.toLowerCase()] = false;
    });
}

function createRoadLines() {
    for (let i = 0; i < 150; i++) {
        const geo = new THREE.BoxGeometry(0.3, 0.02, 4);
        const mat = new THREE.MeshStandardMaterial({
            color: 0xffffff,
            emissive: 0x00ffff,
            emissiveIntensity: 0.6
        });

        const line = new THREE.Mesh(geo, mat);
        line.position.set(0, 0.02, -i * 12);
        scene.add(line);
        worldObjects.push(line);
    }
}

function createBike() {
    bike = new THREE.Group();

    const bodyMat = new THREE.MeshStandardMaterial({
        color: 0x00ffff,
        emissive: 0x0088aa,
        metalness: 1,
        roughness: 0.2
    });

    const blackMat = new THREE.MeshStandardMaterial({
        color: 0x111111,
        metalness: 0.9,
        roughness: 0.3
    });

    // Main body
    const body = new THREE.Mesh(
        new THREE.BoxGeometry(1, 0.5, 3),
        bodyMat
    );
    body.castShadow = true;
    bike.add(body);

    // Seat
    const seat = new THREE.Mesh(
        new THREE.BoxGeometry(0.8, 0.3, 1),
        blackMat
    );
    seat.position.set(0, 0.4, 0);
    bike.add(seat);

    // Wheels
    const wheelGeo = new THREE.CylinderGeometry(0.5, 0.5, 0.4, 24);

    const wheel1 = new THREE.Mesh(wheelGeo, blackMat);
    wheel1.rotation.z = Math.PI / 2;
    wheel1.position.set(0, -0.5, 1.2);
    bike.add(wheel1);

    const wheel2 = new THREE.Mesh(wheelGeo, blackMat);
    wheel2.rotation.z = Math.PI / 2;
    wheel2.position.set(0, -0.5, -1.2);
    bike.add(wheel2);

    // Headlight
    const headlight = new THREE.PointLight(0x00ffff, 10, 40);
    headlight.position.set(0, 0.2, -2);
    bike.add(headlight);

    bike.position.y = 1;
    scene.add(bike);
}

function createCity() {
    for (let i = 0; i < 300; i++) {
        const height = Math.random() * 30 + 5;

        const geo = new THREE.BoxGeometry(
            Math.random() * 5 + 3,
            height,
            Math.random() * 5 + 3
        );

        const mat = new THREE.MeshStandardMaterial({
            color: new THREE.Color(
                Math.random() * 0.3,
                Math.random() * 0.8,
                1
            ),
            emissive: new THREE.Color(
                0,
                Math.random() * 0.5,
                Math.random()
            ),
            emissiveIntensity: 0.5,
            metalness: 0.7,
            roughness: 0.3
        });

        const building = new THREE.Mesh(geo, mat);

        building.position.x = Math.random() > 0.5
            ? Math.random() * 30 + 15
            : -Math.random() * 30 - 15;

        building.position.y = height / 2;
        building.position.z = -Math.random() * 2000;

        building.castShadow = true;
        building.receiveShadow = true;

        scene.add(building);
        worldObjects.push(building);
    }
}

function createSky() {
    const starsGeo = new THREE.BufferGeometry();
    const starVertices = [];

    for (let i = 0; i < 10000; i++) {
        starVertices.push((Math.random() - 0.5) * 2000);
        starVertices.push(Math.random() * 1000);
        starVertices.push((Math.random() - 0.5) * 2000);
    }

    starsGeo.setAttribute(
        'position',
        new THREE.Float32BufferAttribute(starVertices, 3)
    );

    const starsMat = new THREE.PointsMaterial({
        color: 0xffffff,
        size: 0.7
    });

    const stars = new THREE.Points(starsGeo, starsMat);
    scene.add(stars);
}

function createRamps() {
    for (let i = 0; i < 25; i++) {
        const geo = new THREE.BoxGeometry(4, 1, 8);
        const mat = new THREE.MeshStandardMaterial({
            color: 0xff00ff,
            emissive: 0xaa00aa,
            emissiveIntensity: 1,
            metalness: 0.8,
            roughness: 0.2
        });

        const ramp = new THREE.Mesh(geo, mat);

        ramp.rotation.x = -0.35;

        ramp.position.set(
            (Math.floor(Math.random() * 3) - 1) * 5,
            0.5,
            -i * 120
        );

        ramp.castShadow = true;
        ramp.receiveShadow = true;

        scene.add(ramp);
        ramps.push(ramp);
    }
}

window.startGame = function() {
    gameStarted = true;
    document.getElementById('start').style.display = 'none';
}

function controls() {
    if (!gameStarted) return;

    if (keys['w'] || keys['arrowup']) {
        speed += 0.03;
    }

    if (keys['s'] || keys['arrowdown']) {
        speed -= 0.04;
    }

    if (keys['shift']) {
        maxSpeed = 5;
    } else {
        maxSpeed = 3;
    }

    speed *= 0.98;

    speed = Math.max(0, Math.min(speed, maxSpeed));

    if (keys['a'] || keys['arrowleft']) {
        bike.position.x -= 0.18 + speed * 0.05;
        bike.rotation.z = 0.3;
    } else if (keys['d'] || keys['arrowright']) {
        bike.position.x += 0.18 + speed * 0.05;
        bike.rotation.z = -0.3;
    } else {
        bike.rotation.z *= 0.85;
    }

    bike.position.x = Math.max(-8, Math.min(8, bike.position.x));
}

function updateWorld() {
    if (!gameStarted) return;

    distance += speed;

    worldObjects.forEach(obj => {
        obj.position.z += speed * 4;

        if (obj.position.z > 100) {
            obj.position.z -= 2000;
        }
    });

    ramps.forEach(ramp => {
        ramp.position.z += speed * 5;

        if (ramp.position.z > 20) {
            ramp.position.z = -3000;
            ramp.position.x = (Math.floor(Math.random() * 3) - 1) * 5;
        }

        const dx = bike.position.x - ramp.position.x;
        const dz = bike.position.z - ramp.position.z;

        if (Math.abs(dx) < 2.5 && Math.abs(dz) < 5) {
            bike.position.y = 3;
        }
    });

    document.getElementById('speed').textContent = Math.floor(speed * 80);
    document.getElementById('distance').textContent = Math.floor(distance);
}

function cameraFollow() {
    camera.position.x += (bike.position.x - camera.position.x) * 0.08;

    camera.lookAt(
        bike.position.x,
        bike.position.y + 1,
        bike.position.z - 20
    );
}

function animate() {
    requestAnimationFrame(animate);

    controls();
    updateWorld();
    cameraFollow();

    bike.position.y += (1 - bike.position.y) * 0.08;

    renderer.render(scene, camera);
}

function onResize() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
}
</script>

</body>
</html>
