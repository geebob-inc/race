<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Neon City House + Garage</title>

<style>
body{
margin:0;
overflow:hidden;
background:#000;
font-family:Arial;
}

#hud{
position:absolute;
top:15px;
left:15px;
padding:12px;
background:rgba(0,0,0,0.6);
color:white;
border-radius:10px;
width:280px;
z-index:10;
font-size:14px;
}

canvas{display:block;}
</style>
</head>

<body>

<div id="hud">
WASD Move<br>
E Enter/Exit Bike / House / Garage
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>

// ================= SCENE =================
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,3000);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,1.5));
document.body.appendChild(renderer.domElement);

// ================= LIGHT =================
scene.add(new THREE.HemisphereLight(0x88ccff,0x080810,1.2));

const sun = new THREE.DirectionalLight(0xffffff,2);
sun.position.set(40,60,20);
scene.add(sun);

// ================= GROUND =================
const ground = new THREE.Mesh(
new THREE.PlaneGeometry(2000,2000),
new THREE.MeshStandardMaterial({color:0x111111})
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

// ================= CITY =================
for(let i=0;i<150;i++){
const h = Math.random()*25+5;

const b = new THREE.Mesh(
new THREE.BoxGeometry(5,h,5),
new THREE.MeshStandardMaterial({
color:0x111111,
emissive:0x111133,
emissiveIntensity:0.5
})
);

b.position.set(
(Math.random()-0.5)*800,
h/2,
(Math.random()-0.5)*800
);

scene.add(b);
}

// ================= HOUSE + GARAGE =================
const house = new THREE.Group();

// HOUSE BODY
const walls = new THREE.Mesh(
new THREE.BoxGeometry(30,12,20),
new THREE.MeshStandardMaterial({
color:0x222222,
roughness:0.9
})
);
walls.position.y = 6;
house.add(walls);

// ROOF
const roof = new THREE.Mesh(
new THREE.BoxGeometry(32,2,22),
new THREE.MeshStandardMaterial({color:0x111111})
);
roof.position.y = 13;
house.add(roof);

// FRONT DOOR
const door = new THREE.Mesh(
new THREE.BoxGeometry(3,5,0.5),
new THREE.MeshStandardMaterial({
color:0x00e5ff,
emissive:0x00e5ff,
emissiveIntensity:1
})
);
door.position.set(10,2.5,10.3);
house.add(door);

// GARAGE DOOR
const garageDoor = new THREE.Mesh(
new THREE.BoxGeometry(10,6,0.5),
new THREE.MeshStandardMaterial({color:0x555555})
);
garageDoor.position.set(-10,3,10.3);
house.add(garageDoor);

// POSITION HOUSE
house.position.set(40,0,40);
scene.add(house);

// ================= PLAYER =================
const player = new THREE.Mesh(
new THREE.CapsuleGeometry(0.4,1,4,8),
new THREE.MeshStandardMaterial({color:0x00e5ff})
);
player.position.set(0,1,0);
scene.add(player);

// ================= BIKE =================
const bike = new THREE.Mesh(
new THREE.BoxGeometry(1.5,0.5,3),
new THREE.MeshStandardMaterial({
color:0xff2a2a,
metalness:1,
roughness:0.25
})
);
bike.position.set(5,0.5,0);
scene.add(bike);

// ================= GARAGE SPOT =================
const garageSpot = new THREE.Vector3(40,0,30);

// ================= STATE =================
let keys = {};
let inBike = true;
let inHouse = false;
let inGarage = false;
let speed = 0;

// ================= INPUT =================
window.addEventListener("keydown",e=>{
keys[e.key.toLowerCase()] = true;

if(e.key.toLowerCase()==="e"){

const dx = player.position.x - house.position.x;
const dz = player.position.z - house.position.z;
const dist = Math.sqrt(dx*dx + dz*dz);

// ===== HOUSE ENTER =====
if(dist < 20){
inHouse = true;
inBike = false;
inGarage = false;

player.position.set(house.position.x,1,house.position.z);
return;
}

// ===== GARAGE ENTER =====
const gdx = player.position.x - (house.position.x - 10);
const gdz = player.position.z - house.position.z;
const gdist = Math.sqrt(gdx*gdx + gdz*gdz);

if(gdist < 15){
inGarage = true;
inHouse = false;
inBike = false;

player.position.copy(garageSpot);
bike.position.copy(garageSpot);
return;
}

// ===== BIKE TOGGLE =====
inBike = !inBike;
inHouse = false;
inGarage = false;

player.position.copy(bike.position);
}
});

window.addEventListener("keyup",e=>{
keys[e.key.toLowerCase()] = false;
});

// ================= CAMERA =================
const target = new THREE.Vector3();

// ================= LOOP =================
function animate(){
requestAnimationFrame(animate);

// ================= HOUSE MODE =================
if(inHouse){

target.set(
house.position.x,
10,
house.position.z + 18
);

camera.position.lerp(target,0.08);
camera.lookAt(house.position);

renderer.render(scene,camera);
return;
}

// ================= GARAGE MODE =================
if(inGarage){

bike.position.lerp(garageSpot,0.1);
bike.rotation.y = THREE.MathUtils.lerp(bike.rotation.y,0,0.1);

target.set(
house.position.x - 5,
5,
house.position.z + 15
);

camera.position.lerp(target,0.08);
camera.lookAt(bike.position);

renderer.render(scene,camera);
return;
}

// ================= BIKE MODE =================
if(inBike){

if(keys["w"]) speed += 0.02;
else speed *= 0.97;

if(keys["s"]) speed -= 0.02;

speed = THREE.MathUtils.clamp(speed,-0.3,1.2);

if(keys["a"]) bike.rotation.y += 0.04;
if(keys["d"]) bike.rotation.y -= 0.04;

bike.position.x -= Math.sin(bike.rotation.y)*speed;
bike.position.z -= Math.cos(bike.rotation.y)*speed;

player.position.copy(bike.position);
player.position.y = 1;

target.set(
bike.position.x,
bike.position.y + 1.3,
bike.position.z + 5
);

camera.position.lerp(target,0.1);
camera.lookAt(bike.position);
}

// ================= FOOT MODE =================
else{

let move = 0.2;

if(keys["w"]) player.position.z -= move;
if(keys["s"]) player.position.z += move;
if(keys["a"]) player.position.x -= move;
if(keys["d"]) player.position.x += move;

target.set(
player.position.x,
3,
player.position.z + 6
);

camera.position.lerp(target,0.1);
camera.lookAt(player.position);
}

renderer.render(scene,camera);

}

animate();

// ================= RESIZE =================
window.addEventListener("resize",()=>{
camera.aspect = innerWidth/innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(innerWidth,innerHeight);
});

</script>

</body>
</html>
