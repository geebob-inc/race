# 3D First-Person RPG Game (GitHub Ready + Shooting)

Replace your entire file with this version.

```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Shadow Agent RPG</title>
<style>
body { margin:0; overflow:hidden; font-family:Arial; background:#000; }
canvas { display:block; }

#hud{
    position:absolute;
    top:20px;
    left:20px;
    color:white;
    background:rgba(0,0,0,0.6);
    padding:15px;
    border-radius:12px;
    z-index:10;
    width:220px;
}

.bar{height:12px; margin:5px 0; border-radius:10px;}
.health{background:red; width:100%;}
.shield{background:dodgerblue; width:80%;}
.energy{background:limegreen; width:60%;}

#crosshair{
    position:absolute;
    top:50%; left:50%;
    transform:translate(-50%,-50%);
    color:white;
    font-size:28px;
    z-index:10;
}
</style>
</head>
<body>

<div id="hud">
<h2>Agent</h2>
<div class="bar health"></div>
<div class="bar shield"></div>
<div class="bar energy"></div>
<p>Level 1</p>
<p id="ammo">Ammo: ∞</p>
</div>
<div id="crosshair">+</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/examples/js/controls/PointerLockControls.js"></script>

<script>
let scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

let camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(0, 5, 10);

let renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

let controls = new THREE.PointerLockControls(camera, document.body);
document.body.addEventListener('click', () => controls.lock());
scene.add(controls.getObject());

// LIGHT
scene.add(new THREE.HemisphereLight(0xffffff,0x444444,2));

// GROUND
let ground = new THREE.Mesh(
    new THREE.PlaneGeometry(1000,1000),
    new THREE.MeshPhongMaterial({color:0x3c7a3c})
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

// CASTLE
let castle = new THREE.Mesh(
    new THREE.BoxGeometry(50,60,50),
    new THREE.MeshPhongMaterial({color:0x888888})
);
castle.position.set(0,30,-100);
scene.add(castle);

// ENEMIES
let enemies=[];
for(let i=0;i<6;i++){
    let e = new THREE.Mesh(
        new THREE.BoxGeometry(3,6,3),
        new THREE.MeshPhongMaterial({color:0xff0000})
    );
    e.position.set((Math.random()-0.5)*100,3,(Math.random()-0.5)*100);
    scene.add(e);
    enemies.push(e);
}

// MOVEMENT
let moveF=false, moveB=false, moveL=false, moveR=false;

document.addEventListener('keydown',e=>{
    if(e.code==='KeyW') moveF=true;
    if(e.code==='KeyS') moveB=true;
    if(e.code==='KeyA') moveL=true;
    if(e.code==='KeyD') moveR=true;
});

document.addEventListener('keyup',e=>{
    if(e.code==='KeyW') moveF=false;
    if(e.code==='KeyS') moveB=false;
    if(e.code==='KeyA') moveL=false;
    if(e.code==='KeyD') moveR=false;
});

// SHOOTING (RAYCAST)
const raycaster = new THREE.Raycaster();
const direction = new THREE.Vector3();

function shoot(){
    if(!controls.isLocked) return;

    camera.getWorldDirection(direction);

    raycaster.set(camera.position, direction);

    const hits = raycaster.intersectObjects(enemies);

    if(hits.length > 0){
        const enemy = hits[0].object;
        scene.remove(enemy);
        enemies = enemies.filter(e => e !== enemy);
    }
}

document.addEventListener('mousedown', shoot);

function animate(){
    requestAnimationFrame(animate);

    if(controls.isLocked){
        if(moveF) controls.moveForward(0.5);
        if(moveB) controls.moveForward(-0.5);
        if(moveL) controls.moveRight(-0.5);
        if(moveR) controls.moveRight(0.5);
    }

    renderer.render(scene,camera);
}

animate();

window.addEventListener('resize',()=>{
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth,window.innerHeight);
});
</script>

</body>
</html>
```
