<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Spider Hero FP</title>
<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
  font-family: Arial, sans-serif;
}

#ui {
  position: absolute;
  top: 10px;
  left: 10px;
  color: white;
  z-index: 100;
  background: rgba(0,0,0,0.55);
  padding: 14px;
  border-radius: 14px;
  max-width: 260px;
}

#crosshair {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: white;
  font-size: 30px;
  z-index: 100;
  pointer-events: none;
}

#loading {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 28px;
  background: black;
  z-index: 200;
}

canvas {
  display: block;
}
</style>
</head>
<body>

<div id="loading">Loading Spider Hero...</div>

<div id="ui">
  <h2>🕷 Spider Hero</h2>
  <div>Ultimate Spider Movement</div>
  <br>
  <b>Controls</b><br>
  WASD = Move<br>
  Mouse = Look Around<br>
  SPACE = Jump / Wall Jump<br>
  SHIFT = Sprint<br>
  Hold Left Click = Web Swing<br>
  E = Zip To Building<br>
  Q = Air Dash
</div>

<div id="crosshair">+</div>

<script type="module">
import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
import { PointerLockControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/PointerLockControls.js?module';

const loading = document.getElementById('loading');

// SCENE
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);
scene.fog = new THREE.Fog(0x87ceeb, 50, 900);

// CAMERA
const camera = new THREE.PerspectiveCamera(
  75,
  window.innerWidth / window.innerHeight,
  0.1,
  3000
);

camera.position.set(0, 10, 0);

// RENDERER
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

// LIGHTS
const sunlight = new THREE.DirectionalLight(0xffffff, 2);
sunlight.position.set(150, 250, 100);
sunlight.castShadow = true;
scene.add(sunlight);

scene.add(new THREE.AmbientLight(0xffffff, 0.7));

// GROUND
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(5000, 5000),
  new THREE.MeshPhongMaterial({ color: 0x2e2e2e })
);

ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

// ROADS
const roadMaterial = new THREE.MeshPhongMaterial({ color: 0x111111 });

for(let i = -2000; i <= 2000; i += 200) {
  const road1 = new THREE.Mesh(
    new THREE.BoxGeometry(40, 0.1, 5000),
    roadMaterial
  );

  road1.position.set(i, 0.05, 0);
  scene.add(road1);

  const road2 = new THREE.Mesh(
    new THREE.BoxGeometry(5000, 0.1, 40),
    roadMaterial
  );

  road2.position.set(0, 0.05, i);
  scene.add(road2);
}

// BUILDINGS
const collidableBuildings = [];

for(let i = 0; i < 450; i++) {
  const width = 20 + Math.random() * 40;
  const height = 50 + Math.random() * 250;
  const depth = 20 + Math.random() * 40;

  const building = new THREE.Mesh(
    new THREE.BoxGeometry(width, height, depth),
    new THREE.MeshPhongMaterial({
      color: new THREE.Color(
        0.2 + Math.random() * 0.4,
        0.2 + Math.random() * 0.4,
        0.2 + Math.random() * 0.4
      )
    })
  );

  building.position.set(
    (Math.random() - 0.5) * 4000,
    height / 2,
    (Math.random() - 0.5) * 4000
  );

  building.castShadow = true;
  building.receiveShadow = true;

  building.userData.boundingBox = new THREE.Box3().setFromObject(building);

  collidableBuildings.push(building);
  scene.add(building);
}

// CONTROLS
const controls = new PointerLockControls(camera, document.body);
scene.add(controls.getObject());

window.addEventListener('click', () => {
  controls.lock();
});

controls.addEventListener('lock', () => {
  loading.style.display = 'none';
});

// INPUT
const keys = {};

window.addEventListener('keydown', (e) => {
  keys[e.code] = true;
});

window.addEventListener('keyup', (e) => {
  keys[e.code] = false;
});

// PLAYER PHYSICS
let velocityY = 0;
let onGround = false;
let wallClimbing = false;
let airDashCooldown = 0;

const playerBox = new THREE.Box3();
const playerSize = new THREE.Vector3(6, 14, 6);

// STABILITY SETTINGS
camera.rotation.order = 'YXZ';

// WEB SWING
let swinging = false;
let swingPoint = new THREE.Vector3();

const webMaterial = new THREE.LineBasicMaterial({
  color: 0xffffff,
  transparent: true,
  opacity: 0.95
});

const webGeometry = new THREE.BufferGeometry().setFromPoints([
  new THREE.Vector3(),
  new THREE.Vector3()
]);

const webLine = new THREE.Line(webGeometry, webMaterial);
webLine.visible = false;
scene.add(webLine);

// HANDS
const handGeometry = new THREE.SphereGeometry(0.25, 12, 12);
const handMaterial = new THREE.MeshBasicMaterial({ color: 0xff0000 });

const leftHand = new THREE.Mesh(handGeometry, handMaterial);
const rightHand = new THREE.Mesh(handGeometry, handMaterial);

camera.add(leftHand);
camera.add(rightHand);

leftHand.position.set(-0.45, -0.45, -1);
rightHand.position.set(0.45, -0.45, -1);

scene.add(camera);

// WEB PROJECTILES
const activeWebs = [];

window.addEventListener('mousedown', () => {
  webLine.visible = true;
  swinging = true;

  const direction = new THREE.Vector3();
  camera.getWorldDirection(direction);

  swingPoint.copy(camera.position)
    .add(direction.multiplyScalar(120));

  swingPoint.y += 70;

  webLine.visible = true;

  const webBall = new THREE.Mesh(
    new THREE.SphereGeometry(0.3, 8, 8),
    new THREE.MeshBasicMaterial({ color: 0xffffff })
  );

  webBall.position.copy(camera.position);
  scene.add(webBall);

  activeWebs.push({
    mesh: webBall,
    velocity: direction.clone().multiplyScalar(6),
    life: 60
  });
});

window.addEventListener('mouseup', () => {
  swinging = false;

  // KEEP WEB VISIBLE BRIEFLY
  setTimeout(() => {
    if(!swinging) {
      webLine.visible = false;
    }
  }, 150);
});

// SPECIAL MOVES
window.addEventListener('keydown', (e) => {
  if(e.code === 'KeyE') {
    const dir = new THREE.Vector3();
    camera.getWorldDirection(dir);

    camera.position.add(dir.multiplyScalar(30));
    camera.position.y += 10;
  }

  if(e.code === 'KeyQ' && airDashCooldown <= 0) {
    const dashDir = new THREE.Vector3();
    camera.getWorldDirection(dashDir);

    camera.position.add(dashDir.multiplyScalar(25));
    airDashCooldown = 60;
  }
});

function checkBuildingCollision(position) {
  playerBox.setFromCenterAndSize(
    new THREE.Vector3(position.x, position.y + 6, position.z),
    playerSize
  );

  for(const building of collidableBuildings) {
    building.userData.boundingBox.setFromObject(building);

    if(playerBox.intersectsBox(building.userData.boundingBox)) {
      return building;
    }
  }

  return null;
}

function resolveCollision(oldPosition) {
  const collision = checkBuildingCollision(camera.position);

  if(collision) {
    camera.position.copy(oldPosition);
    return true;
  }

  return false;
}

function updateMovement() {
  if(airDashCooldown > 0) airDashCooldown--;

  const moveSpeed = keys['ShiftLeft'] ? 1.8 : 1.0;

  const oldPosition = camera.position.clone();

  // KEEP CAMERA STABLE
  camera.rotation.z = 0;

  if(keys['KeyW']) controls.moveForward(moveSpeed);
  if(keys['KeyS']) controls.moveForward(-moveSpeed);
  if(keys['KeyA']) controls.moveRight(-moveSpeed);
  if(keys['KeyD']) controls.moveRight(moveSpeed);

  // PREVENT WALKING THROUGH OBJECTS
  resolveCollision(oldPosition);

  const collidedBuilding = checkBuildingCollision(camera.position);

  if(collidedBuilding) {
    // AUTO WALL CLIMB
    wallClimbing = true;

    // AUTOMATIC CLIMBING MOVEMENT
    if(keys['KeyW']) {
      velocityY = 0.24;
    }

    // STICK TO WALL
    camera.position.copy(oldPosition);
    camera.position.y += 2;

    // WALL JUMP
    if(keys['Space']) {
      velocityY = 0.55;

      const bounceDir = new THREE.Vector3();
      camera.getWorldDirection(bounceDir);
      camera.position.add(bounceDir.multiplyScalar(-12));
    }
  } else {
    wallClimbing = false;
  }

  // GRAVITY
  if(!wallClimbing) {
    velocityY -= 0.02;
  }

  camera.position.y += velocityY;

  // FLOOR
  if(camera.position.y <= 10) {
    camera.position.y = 10;
    velocityY = 0;
    onGround = true;
    wallClimbing = false;
  }

  // JUMP
  if(keys['Space'] && onGround) {
    velocityY = 0.45;
    onGround = false;
  }

  // WEB SWINGING
  if(swinging) {
    const pullDirection = new THREE.Vector3()
      .subVectors(swingPoint, camera.position)
      .normalize();

    camera.position.add(pullDirection.multiplyScalar(3.8));
    camera.position.y += 0.08;

    const swingCollision = checkBuildingCollision(camera.position);

    if(swingCollision && !wallClimbing) {
      camera.position.copy(oldPosition);
    }

    // PREVENT GOING THROUGH BUILDINGS WHILE SWINGING
    resolveCollision(oldPosition);

    const handWorldPosition = new THREE.Vector3();
    rightHand.getWorldPosition(handWorldPosition);

    webGeometry.setFromPoints([
      handWorldPosition,
      swingPoint.clone()
    ]);

    camera.fov = 82;
    camera.updateProjectionMatrix();
  } else {
    camera.fov += (75 - camera.fov) * 0.08;
    camera.updateProjectionMatrix();
  }
}

// WALL WEB VISUALS
for(const building of collidableBuildings.slice(0, 100)) {
  const webPattern = new THREE.Mesh(
    new THREE.PlaneGeometry(8, 8),
    new THREE.MeshBasicMaterial({
      color: 0xffffff,
      transparent: true,
      opacity: 0.15,
      side: THREE.DoubleSide
    })
  );

  webPattern.position.set(
    building.position.x,
    building.position.y,
    building.position.z + (building.geometry.parameters.depth / 2) + 0.2
  );

  scene.add(webPattern);
}

// ANIMATION
function animate() {
  requestAnimationFrame(animate);

  updateMovement();

  // UPDATE WEB PROJECTILES
  for(let i = activeWebs.length - 1; i >= 0; i--) {
    const web = activeWebs[i];

    web.mesh.position.add(web.velocity);
    web.life--;

    web.mesh.rotation.x += 0.2;
    web.mesh.rotation.y += 0.2;

    if(web.life <= 0) {
      scene.remove(web.mesh);
      activeWebs.splice(i, 1);
    }
  }

  // HAND ANIMATION
  leftHand.position.y = -0.45 + Math.sin(Date.now() * 0.01) * 0.03;
  rightHand.position.y = -0.45 + Math.sin(Date.now() * 0.01) * 0.03;

  // KEEP CAMERA LEVEL
  camera.rotation.z = 0;

  renderer.render(scene, camera);
}

animate();

// RESIZE
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// TESTS
console.assert(scene instanceof THREE.Scene, 'Scene failed to create');
console.assert(camera instanceof THREE.PerspectiveCamera, 'Camera failed');
console.assert(renderer instanceof THREE.WebGLRenderer, 'Renderer failed');
console.assert(controls instanceof PointerLockControls, 'Controls failed');
console.assert(collidableBuildings.length > 0, 'Buildings missing');
console.assert(typeof updateMovement === 'function', 'Movement missing');
console.assert(activeWebs instanceof Array, 'Web system failed');
console.assert(typeof resolveCollision === 'function', 'Collision system failed');

console.log('Spider Hero Ultimate loaded successfully');
</script>

</body>
</html>
