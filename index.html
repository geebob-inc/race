<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Kingdom Siege - Medieval First Person Combat</title>
<style>
html,body{
    margin:0;
    overflow:hidden;
    background:black;
    font-family:Arial,sans-serif;
}

canvas{
    display:block;
}

#hud{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    padding:20px;
    color:white;
    pointer-events:none;
}

#healthBox{
    width:320px;
    height:28px;
    border:3px solid #111;
    background:#4d0000;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 0 20px black;
}

#health{
    width:100%;
    height:100%;
    background:linear-gradient(to right,#00ff6a,#0a7f33);
}

#crosshair{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:20px;
    height:20px;
    pointer-events:none;
}

#crosshair::before,
#crosshair::after{
    content:'';
    position:absolute;
    background:white;
}

#crosshair::before{
    width:2px;
    height:20px;
    left:9px;
}

#crosshair::after{
    width:20px;
    height:2px;
    top:9px;
}

#message{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    color:white;
    font-size:70px;
    text-shadow:0 0 20px black;
    display:none;
}

#controls{
    position:absolute;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    background:rgba(0,0,0,0.55);
    color:white;
    padding:12px 20px;
    border-radius:15px;
    font-size:15px;
}
</style>
</head>
<body>

<div id="hud">
    <h2>⚔ Kingdom Siege</h2>
    <div id="healthBox">
        <div id="health"></div>
    </div>
</div>

<div id="crosshair"></div>
<div id="message"></div>

<div id="controls">
WASD = Move | Mouse = Look | Click = Sword Attack<br>
Survive the siege and defend the kingdom.
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const healthBar = document.getElementById('health');
const message = document.getElementById('message');

const world = {
    width: 3200,
    height: 3200
};

const keys = {};
const enemies = [];

let mouseX = 0;
let attackAnim = 0;

const player = {
    x: 1300,
    y: 1300,
    angle: 0,
    speed: 0,
    health: 100
};

for(let i=0;i<18;i++){
    enemies.push({
        x: Math.random()*world.width,
        y: Math.random()*world.height,
        alive: true,
        attackTimer: 0
    });
}

function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener('resize',resize);

window.addEventListener('keydown',e=>{
    keys[e.key.toLowerCase()] = true;
});

window.addEventListener('keyup',e=>{
    keys[e.key.toLowerCase()] = false;
});

canvas.addEventListener('click',()=>{
    attackAnim = 12;

    enemies.forEach(enemy=>{
        if(!enemy.alive) return;

        const dx = enemy.x-player.x;
        const dy = enemy.y-player.y;
        const dist = Math.sqrt(dx*dx+dy*dy);

        const angleToEnemy = Math.atan2(dy,dx);
        let diff = angleToEnemy - player.angle;

        while(diff > Math.PI) diff -= Math.PI*2;
        while(diff < -Math.PI) diff += Math.PI*2;

        if(Math.abs(diff) < 0.35 && dist < 180){
            enemy.alive = false;
        }
    });
});

window.addEventListener('mousemove',e=>{
    mouseX = e.movementX;
    player.angle += mouseX*0.0025;
});

function movePlayer(){
    const moveSpeed = 5;

    let mx = 0;
    let my = 0;

    if(keys['w']){
        mx += Math.cos(player.angle)*moveSpeed;
        my += Math.sin(player.angle)*moveSpeed;
    }

    if(keys['s']){
        mx -= Math.cos(player.angle)*moveSpeed;
        my -= Math.sin(player.angle)*moveSpeed;
    }

    if(keys['a']){
        mx += Math.cos(player.angle-Math.PI/2)*moveSpeed;
        my += Math.sin(player.angle-Math.PI/2)*moveSpeed;
    }

    if(keys['d']){
        mx += Math.cos(player.angle+Math.PI/2)*moveSpeed;
        my += Math.sin(player.angle+Math.PI/2)*moveSpeed;
    }

    player.x += mx;
    player.y += my;

    player.x = Math.max(0,Math.min(world.width,player.x));
    player.y = Math.max(0,Math.min(world.height,player.y));
}

function drawSky(){
    const sky = ctx.createLinearGradient(0,0,0,canvas.height/2);
    sky.addColorStop(0,'#1f1a17');
    sky.addColorStop(0.4,'#5c4630');
    sky.addColorStop(1,'#9b7b58');

    ctx.fillStyle = sky;
    ctx.fillRect(0,0,canvas.width,canvas.height/2);

    const glow = ctx.createRadialGradient(canvas.width*0.75,120,10,canvas.width*0.75,120,180);
    glow.addColorStop(0,'rgba(255,210,120,0.8)');
    glow.addColorStop(1,'rgba(255,210,120,0)');

    ctx.fillStyle = glow;
    ctx.fillRect(0,0,canvas.width,canvas.height/2);
}

function drawGround(){
    const dirt = ctx.createLinearGradient(0,canvas.height/2,0,canvas.height);
    dirt.addColorStop(0,'#5e4b32');
    dirt.addColorStop(1,'#24170d');

    ctx.fillStyle = dirt;
    ctx.fillRect(0,canvas.height/2,canvas.width,canvas.height/2);

    ctx.fillStyle = '#6f5a3f';
    ctx.beginPath();
    ctx.moveTo(canvas.width*0.4,canvas.height);
    ctx.lineTo(canvas.width*0.48,canvas.height/2+20);
    ctx.lineTo(canvas.width*0.52,canvas.height/2+20);
    ctx.lineTo(canvas.width*0.6,canvas.height);
    ctx.fill();
}

function drawCastle(){
    ctx.save();
    ctx.translate(canvas.width/2,canvas.height/2);

    const dx = 1500-player.x;
    const dy = 900-player.y;

    const angle = Math.atan2(dy,dx)-player.angle;
    const dist = Math.sqrt(dx*dx+dy*dy);

    const screenX = Math.tan(angle)*500;
    const size = Math.max(50,12000/dist);

    // Main wall
    ctx.fillStyle = '#726960';
    ctx.fillRect(screenX-size/2,90,size,size*0.8);

    // Towers
    ctx.fillStyle = '#5a534d';
    ctx.fillRect(screenX-size/2-60,40,size*0.22,size*1.1);
    ctx.fillRect(screenX+size/2+15,40,size*0.22,size*1.1);

    // Battlements
    ctx.fillStyle = '#4e4843';
    for(let i=0;i<8;i++){
        ctx.fillRect(screenX-size/2+i*(size/8),70,24,24);
    }

    // Gate
    ctx.fillStyle = '#2a1b12';
    ctx.fillRect(screenX-size*0.12,220,size*0.24,size*0.45);

    // Torches
    ctx.fillStyle = '#ffbb55';
    ctx.beginPath();
    ctx.arc(screenX-size*0.17,260,8,0,Math.PI*2);
    ctx.arc(screenX+size*0.17,260,8,0,Math.PI*2);
    ctx.fill();

    // Fire glow
    const leftGlow = ctx.createRadialGradient(screenX-size*0.17,260,5,screenX-size*0.17,260,40);
    leftGlow.addColorStop(0,'rgba(255,180,60,0.8)');
    leftGlow.addColorStop(1,'rgba(255,180,60,0)');
    ctx.fillStyle = leftGlow;
    ctx.beginPath();
    ctx.arc(screenX-size*0.17,260,40,0,Math.PI*2);
    ctx.fill();

    const rightGlow = ctx.createRadialGradient(screenX+size*0.17,260,5,screenX+size*0.17,260,40);
    rightGlow.addColorStop(0,'rgba(255,180,60,0.8)');
    rightGlow.addColorStop(1,'rgba(255,180,60,0)');
    ctx.fillStyle = rightGlow;
    ctx.beginPath();
    ctx.arc(screenX+size*0.17,260,40,0,Math.PI*2);
    ctx.fill();

    // Banners
    ctx.fillStyle = '#7b0000';
    ctx.fillRect(screenX-size/2-20,70,14,120);
    ctx.fillRect(screenX+size/2+45,70,14,120);

    ctx.beginPath();
    ctx.moveTo(screenX-size/2-6,70);
    ctx.lineTo(screenX-size/2+70,95);
    ctx.lineTo(screenX-size/2-6,120);
    ctx.fill();

    ctx.beginPath();
    ctx.moveTo(screenX+size/2+59,70);
    ctx.lineTo(screenX+size/2+135,95);
    ctx.lineTo(screenX+size/2+59,120);
    ctx.fill();

    // Windows
    ctx.fillStyle = '#130d08';
    for(let i=0;i<5;i++){
        ctx.fillRect(screenX-size/2+60+i*(size/5),170,20,45);
    }

    ctx.restore();
}

function drawEnemies(){
    enemies.forEach(enemy=>{
        if(!enemy.alive) return;

        const dx = enemy.x-player.x;
        const dy = enemy.y-player.y;

        const distance = Math.sqrt(dx*dx+dy*dy);

        const angle = Math.atan2(dy,dx)-player.angle;

        while(angle < -Math.PI) angle += Math.PI*2;
        while(angle > Math.PI) angle -= Math.PI*2;

        if(Math.abs(angle) > 1.2) return;

        const screenX = canvas.width/2 + Math.tan(angle)*700;
        const size = Math.max(20,10000/(distance+1));

        const y = canvas.height/2 + 100 - size;

        ctx.fillStyle = '#220000';
        ctx.beginPath();
        ctx.ellipse(screenX,y+size,size*0.45,size*0.2,0,0,Math.PI*2);
        ctx.fill();

        ctx.fillStyle = '#6f0d0d';
        ctx.fillRect(screenX-size/4,y,size/2,size);

        ctx.fillStyle = '#8a8a8a';
        ctx.fillRect(screenX-size/5,y+size*0.2,size*0.4,size*0.25);

        ctx.fillStyle = '#4b2d16';
        ctx.fillRect(screenX-size*0.45,y+size*0.35,size*0.15,size*0.35);

        ctx.fillStyle = '#cccccc';
        ctx.fillRect(screenX-size/6,y-size/5,size/3,size/5);

        ctx.fillStyle = 'red';
        ctx.fillRect(screenX-size/8,y+size*0.3,size/4,6);

        if(distance < 120){
            enemy.attackTimer++;

            if(enemy.attackTimer > 40){
                player.health -= 8;
                enemy.attackTimer = 0;
            }
        }
    });
}

function drawSword(){
    ctx.save();

    const swing = attackAnim > 0 ? Math.sin(attackAnim*0.4)*140 : 0;

    ctx.translate(canvas.width-180+swing,canvas.height-120);
    ctx.rotate(-0.9 + swing*0.003);

    ctx.fillStyle = '#4b2d16';
    ctx.fillRect(-12,70,24,95);

    const blade = ctx.createLinearGradient(-10,0,10,0);
    blade.addColorStop(0,'#777');
    blade.addColorStop(0.5,'#f0f0f0');
    blade.addColorStop(1,'#666');

    ctx.fillStyle = blade;
    ctx.fillRect(-8,-240,16,320);

    ctx.beginPath();
    ctx.moveTo(-8,-240);
    ctx.lineTo(0,-295);
    ctx.lineTo(8,-240);
    ctx.fill();

    ctx.fillStyle = '#c8a45f';
    ctx.fillRect(-35,55,70,12);

    ctx.fillStyle = '#aa0000';
    ctx.beginPath();
    ctx.arc(0,60,5,0,Math.PI*2);
    ctx.fill();

    ctx.restore();

    if(attackAnim > 0) attackAnim--;
}

function drawTrees(){
    for(let i=-6;i<7;i++){
        const tx = player.x + i*320;
        const ty = player.y + 500;

        const dx = tx-player.x;
        const dy = ty-player.y;

        const angle = Math.atan2(dy,dx)-player.angle;
        const dist = Math.sqrt(dx*dx+dy*dy);

        if(Math.abs(angle) > 1.2) continue;

        const screenX = canvas.width/2 + Math.tan(angle)*700;
        const size = 7000/dist;

        // Tree trunk
        ctx.fillStyle = '#3b2412';
        ctx.fillRect(screenX-size*0.08,canvas.height/2+50,size*0.16,size*0.7);

        // Leaves
        ctx.fillStyle = '#183f18';
        ctx.beginPath();
        ctx.arc(screenX,canvas.height/2,size*0.35,0,Math.PI*2);
        ctx.fill();

        // Hanging lantern
        ctx.fillStyle = '#d4a84f';
        ctx.fillRect(screenX-3,canvas.height/2+size*0.2,6,14);

        const glow = ctx.createRadialGradient(screenX,canvas.height/2+size*0.3,2,screenX,canvas.height/2+size*0.3,25);
        glow.addColorStop(0,'rgba(255,180,80,0.8)');
        glow.addColorStop(1,'rgba(255,180,80,0)');

        ctx.fillStyle = glow;
        ctx.beginPath();
        ctx.arc(screenX,canvas.height/2+size*0.3,25,0,Math.PI*2);
        ctx.fill();
    }
}

function gameOver(text){
    message.style.display = 'block';
    message.innerHTML = text + '<br><span style="font-size:28px">Refresh to play again</span>';
}

function drawVignette(){
    const vignette = ctx.createRadialGradient(
        canvas.width/2,
        canvas.height/2,
        canvas.width*0.2,
        canvas.width/2,
        canvas.height/2,
        canvas.width*0.8
    );

    vignette.addColorStop(0,'rgba(0,0,0,0)');
    vignette.addColorStop(1,'rgba(0,0,0,0.55)');

    ctx.fillStyle = vignette;
    ctx.fillRect(0,0,canvas.width,canvas.height);
}

function drawRain(){
    ctx.strokeStyle = 'rgba(180,180,220,0.2)';

    for(let i=0;i<120;i++){
        const x = (i*97 + Date.now()/12)%canvas.width;
        const y = (i*53 + Date.now()/8)%canvas.height;

        ctx.beginPath();
        ctx.moveTo(x,y);
        ctx.lineTo(x-6,y+18);
        ctx.stroke();
    }
}

function update(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    movePlayer();

    drawSky();
    drawGround();
    drawCastle();
    drawTrees();
    drawEnemies();
    drawSword();
    drawRain();
    drawVignette();

    healthBar.style.width = player.health + '%';

    if(player.health <= 0){
        gameOver('You Were Defeated');
        return;
    }

    const aliveEnemies = enemies.filter(e=>e.alive).length;

    if(aliveEnemies === 0){
        gameOver('Victory!');
        return;
    }

    const fog = ctx.createLinearGradient(0,0,0,canvas.height);
    fog.addColorStop(0,'rgba(40,30,20,0.05)');
    fog.addColorStop(1,'rgba(0,0,0,0.35)');
    ctx.fillStyle = fog;
    ctx.fillRect(0,0,canvas.width,canvas.height);

    requestAnimationFrame(update);
}

update();
</script>

</body>
</html>
