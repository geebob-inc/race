<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kingdom Siege Remastered</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    overflow:hidden;
    background:#050505;
    font-family:Arial, sans-serif;
}

canvas{
    display:block;
}

#hud{
    position:absolute;
    top:20px;
    left:20px;
    color:white;
    z-index:10;
    text-shadow:0 0 10px black;
}

#title{
    font-size:34px;
    font-weight:bold;
    margin-bottom:12px;
}

#healthContainer{
    width:320px;
    height:30px;
    background:#300;
    border:3px solid #111;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 0 20px black;
}

#healthBar{
    width:100%;
    height:100%;
    background:linear-gradient(to right,#00ff66,#0b7a34);
}

#crosshair{
    position:absolute;
    left:50%;
    top:50%;
    width:24px;
    height:24px;
    transform:translate(-50%,-50%);
    pointer-events:none;
}

#crosshair::before,
#crosshair::after{
    content:'';
    position:absolute;
    background:white;
}

#crosshair::before{
    width:2px;
    height:24px;
    left:11px;
}

#crosshair::after{
    width:24px;
    height:2px;
    top:11px;
}

#controls{
    position:absolute;
    bottom:18px;
    left:50%;
    transform:translateX(-50%);
    color:white;
    background:rgba(0,0,0,0.5);
    padding:12px 22px;
    border-radius:14px;
    font-size:14px;
    text-align:center;
}

#message{
    position:absolute;
    inset:0;
    display:none;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    color:white;
    background:rgba(0,0,0,0.65);
    font-size:70px;
    text-shadow:0 0 25px black;
}

#message span{
    font-size:26px;
    margin-top:16px;
}
</style>
</head>
<body>

<div id="hud">
    <div id="title">⚔ Kingdom Siege Remastered</div>
    <div id="healthContainer">
        <div id="healthBar"></div>
    </div>
</div>

<div id="crosshair"></div>

<div id="controls">
WASD = Move • Mouse = Look • Click = Attack • 1 = Sword • 2 = Bow
</div>

<div id="message"></div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = true;

function resize(){
    canvas.width = innerWidth;
    canvas.height = innerHeight;
}
resize();
addEventListener('resize', resize);

const healthBar = document.getElementById('healthBar');
const message = document.getElementById('message');

const world = {
    size: 5000
};

const player = {
    x: 2500,
    y: 2500,
    angle: 0,
    health: 100,
    speed: 5
};

const keys = {};
const enemies = [];
const particles = [];
let swordSwing = 0;
let currentWeapon = 'sword';
const arrows = [];

// Simple multiplayer across browser tabs/windows
const playerId = Math.random().toString(36).substring(2,9);
const channel = new BroadcastChannel('kingdom_siege_multiplayer');
const remotePlayers = {};

setInterval(()=>{
    channel.postMessage({
        type:'player',
        id:playerId,
        x:player.x,
        y:player.y,
        angle:player.angle,
        health:player.health,
        weapon:currentWeapon
    });
},40);

channel.onmessage = (e)=>{
    const data = e.data;

    if(data.id === playerId) return;

    if(data.type === 'player'){
        remotePlayers[data.id] = data;
    }
};

for(let i=0;i<24;i++){
    enemies.push({
        x: Math.random()*world.size,
        y: Math.random()*world.size,
        health: 100,
        alive: true,
        attackCooldown: 0
    });
}

addEventListener('keydown', e=> keys[e.key.toLowerCase()] = true);
addEventListener('keyup', e=> keys[e.key.toLowerCase()] = false);

addEventListener('mousemove', e=>{
    if(document.pointerLockElement === canvas){
        player.angle += e.movementX * 0.0025;
    }
});

canvas.addEventListener('click', ()=>{
    canvas.requestPointerLock();
});

addEventListener('click', ()=>{
    if(currentWeapon === 'sword'){
        swordSwing = 1;

        enemies.forEach(enemy=>{
            if(!enemy.alive) return;

            const dx = enemy.x - player.x;
            const dy = enemy.y - player.y;

            const dist = Math.hypot(dx,dy);
            const angle = Math.atan2(dy,dx) - player.angle;

            if(Math.abs(angle) < 0.4 && dist < 180){
                enemy.health -= 50;

                for(let i=0;i<12;i++){
                    particles.push({
                        x: enemy.x,
                        y: enemy.y,
                        vx:(Math.random()-0.5)*8,
                        vy:(Math.random()-0.5)*8,
                        life:40
                    });
                }

                if(enemy.health <= 0){
                    enemy.alive = false;
                }
            }
        });
    } else {
        arrows.push({
            x: player.x,
            y: player.y,
            angle: player.angle,
            speed: 18,
            life: 120
        });
    }
});

addEventListener('keydown', e=>{
    if(e.key === '1') currentWeapon = 'sword';
    if(e.key === '2') currentWeapon = 'bow';
});

function movePlayer(){
    let mx = 0;
    let my = 0;

    if(keys['w']){
        mx += Math.cos(player.angle) * player.speed;
        my += Math.sin(player.angle) * player.speed;
    }

    if(keys['s']){
        mx -= Math.cos(player.angle) * player.speed;
        my -= Math.sin(player.angle) * player.speed;
    }

    if(keys['a']){
        mx += Math.cos(player.angle - Math.PI/2) * player.speed;
        my += Math.sin(player.angle - Math.PI/2) * player.speed;
    }

    if(keys['d']){
        mx += Math.cos(player.angle + Math.PI/2) * player.speed;
        my += Math.sin(player.angle + Math.PI/2) * player.speed;
    }

    player.x += mx;
    player.y += my;

    // World boundaries
    player.x = Math.max(0, Math.min(world.size, player.x));
    player.y = Math.max(0, Math.min(world.size, player.y));
}

function drawStars(){
    for(let i=0;i<80;i++){
        const x = (i*137)%canvas.width;
        const y = (i*83)%250;

        ctx.fillStyle = 'rgba(255,255,255,0.5)';
        ctx.fillRect(x,y,2,2);
    }
}

function drawSky(){
    const sky = ctx.createLinearGradient(0,0,0,canvas.height/2);
    sky.addColorStop(0,'#14111b');
    sky.addColorStop(0.5,'#6b4127');
    sky.addColorStop(1,'#c48754');

    ctx.fillStyle = sky;
    ctx.fillRect(0,0,canvas.width,canvas.height/2);

    const sun = ctx.createRadialGradient(canvas.width*0.7,120,20,canvas.width*0.7,120,220);
    sun.addColorStop(0,'rgba(255,220,150,0.9)');
    sun.addColorStop(1,'rgba(255,220,150,0)');

    ctx.fillStyle = sun;
    ctx.fillRect(0,0,canvas.width,canvas.height/2);
}

function drawGround(){
    const ground = ctx.createLinearGradient(0,canvas.height/2,0,canvas.height);
    ground.addColorStop(0,'#5f4b37');
    ground.addColorStop(1,'#1a120b');

    ctx.fillStyle = ground;
    ctx.fillRect(0,canvas.height/2,canvas.width,canvas.height/2);

    ctx.fillStyle = '#776149';
    ctx.beginPath();
    ctx.moveTo(canvas.width*0.38,canvas.height);
    ctx.lineTo(canvas.width*0.47,canvas.height/2+10);
    ctx.lineTo(canvas.width*0.53,canvas.height/2+10);
    ctx.lineTo(canvas.width*0.62,canvas.height);
    ctx.fill();
}

function project(wx,wy){
    const dx = wx - player.x;
    const dy = wy - player.y;

    let angle = Math.atan2(dy,dx) - player.angle;

    while(angle < -Math.PI) angle += Math.PI*2;
    while(angle > Math.PI) angle -= Math.PI*2;

    const dist = Math.hypot(dx,dy);

    if(Math.abs(angle) > 1.2) return null;

    return {
        x: canvas.width/2 + Math.tan(angle)*700,
        size: Math.max(20,12000/(dist+1)),
        dist
    };
}

function drawCastle(){
    const p = project(2400,1200);
    if(!p) return;

    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.fillRect(p.x-p.size/2+30,110,p.size,p.size*0.8);

    const wall = ctx.createLinearGradient(0,100,0,600);
    wall.addColorStop(0,'#8d857d');
    wall.addColorStop(1,'#5f5953');

    ctx.fillStyle = wall;
    ctx.fillRect(p.x-p.size/2,90,p.size,p.size*0.8);

    ctx.fillStyle = '#5b5550';
    ctx.fillRect(p.x-p.size/2-60,40,p.size*0.2,p.size);
    ctx.fillRect(p.x+p.size/2+20,40,p.size*0.2,p.size);

    ctx.fillStyle = '#2a1a12';
    ctx.fillRect(p.x-p.size*0.12,220,p.size*0.24,p.size*0.45);

    ctx.fillStyle = '#7d0000';
    ctx.fillRect(p.x-p.size/2-20,70,14,120);
    ctx.fillRect(p.x+p.size/2+40,70,14,120);
}

function drawTrees(){
    for(let i=-8;i<9;i++){
        const p = project(player.x + i*320, player.y + 650);
        if(!p) continue;

        ctx.fillStyle = '#3a2414';
        ctx.fillRect(p.x-p.size*0.08,canvas.height/2+60,p.size*0.16,p.size*0.8);

        ctx.fillStyle = '#173717';
        ctx.beginPath();
        ctx.arc(p.x,canvas.height/2,p.size*0.4,0,Math.PI*2);
        ctx.fill();
    }
}

function drawRemotePlayers(){
    Object.values(remotePlayers).forEach(other=>{
        const p = project(other.x, other.y);
        if(!p) return;

        const y = canvas.height/2 + 120 - p.size;

        ctx.fillStyle = 'rgba(0,0,0,0.3)';
        ctx.beginPath();
        ctx.ellipse(p.x,y+p.size,p.size*0.4,p.size*0.18,0,0,Math.PI*2);
        ctx.fill();

        const armor = ctx.createLinearGradient(0,y,0,y+p.size);
        armor.addColorStop(0,'#1f6db1');
        armor.addColorStop(1,'#0b2a4e');

        ctx.fillStyle = armor;
        ctx.fillRect(p.x-p.size/4,y,p.size/2,p.size);

        ctx.fillStyle = '#cccccc';
        ctx.fillRect(p.x-p.size/6,y-p.size/5,p.size/3,p.size/5);

        // Nameplate
        ctx.fillStyle = 'white';
        ctx.font = `${Math.max(12,p.size*0.12)}px Arial`;
        ctx.fillText('Knight', p.x-20, y-15);
    });
}

function drawEnemies(){
    enemies.sort((a,b)=>{
        const da = Math.hypot(a.x-player.x,a.y-player.y);
        const db = Math.hypot(b.x-player.x,b.y-player.y);
        return db-da;
    });

    enemies.forEach(enemy=>{
        if(!enemy.alive) return;

        const p = project(enemy.x, enemy.y);
        if(!p) return;

        const y = canvas.height/2 + 120 - p.size;

        ctx.fillStyle = 'rgba(0,0,0,0.35)';
        ctx.beginPath();
        ctx.ellipse(p.x,y+p.size,p.size*0.45,p.size*0.2,0,0,Math.PI*2);
        ctx.fill();

        const armor = ctx.createLinearGradient(0,y,0,y+p.size);
        armor.addColorStop(0,'#b11f1f');
        armor.addColorStop(1,'#4e0909');

        ctx.fillStyle = armor;
        ctx.fillRect(p.x-p.size/4,y,p.size/2,p.size);

        ctx.fillStyle = '#9d9d9d';
        ctx.fillRect(p.x-p.size/5,y+p.size*0.2,p.size*0.4,p.size*0.22);

        ctx.fillStyle = '#4b2d16';
        ctx.fillRect(p.x-p.size*0.48,y+p.size*0.35,p.size*0.15,p.size*0.35);

        ctx.fillStyle = '#cccccc';
        ctx.fillRect(p.x-p.size/6,y-p.size/5,p.size/3,p.size/5);

        if(p.dist < 110){
            enemy.attackCooldown++;

            if(enemy.attackCooldown > 50){
                player.health -= 10;
                enemy.attackCooldown = 0;
            }
        }
    });
}

function updateArrows(){
    for(let index = arrows.length - 1; index >= 0; index--){
        const arrow = arrows[index];
        arrow.x += Math.cos(arrow.angle) * arrow.speed;
        arrow.y += Math.sin(arrow.angle) * arrow.speed;
        arrow.life--;

        enemies.forEach(enemy=>{
            if(!enemy.alive) return;

            const dist = Math.hypot(enemy.x-arrow.x, enemy.y-arrow.y);

            if(dist < 60){
                enemy.health -= 60;
                arrow.life = 0;

                for(let i=0;i<10;i++){
                    particles.push({
                        x: enemy.x,
                        y: enemy.y,
                        vx:(Math.random()-0.5)*6,
                        vy:(Math.random()-0.5)*6,
                        life:30
                    });
                }

                if(enemy.health <= 0){
                    enemy.alive = false;
                }
            }
        });

        const proj = project(arrow.x, arrow.y);

        if(proj){
            ctx.save();
            ctx.translate(proj.x, canvas.height/2 + 90);

            ctx.strokeStyle = '#5b3a1e';
            ctx.lineWidth = Math.max(1,proj.size*0.03);
            ctx.beginPath();
            ctx.moveTo(0,-proj.size*0.12);
            ctx.lineTo(0,proj.size*0.12);
            ctx.stroke();

            ctx.fillStyle = '#cccccc';
            ctx.beginPath();
            ctx.moveTo(0,-proj.size*0.14);
            ctx.lineTo(-proj.size*0.03,-proj.size*0.08);
            ctx.lineTo(proj.size*0.03,-proj.size*0.08);
            ctx.fill();

            ctx.restore();
        }

        if(arrow.life <= 0){
            arrows.splice(index,1);
        }
    }
}

function drawParticles(){
    for(let index = particles.length - 1; index >= 0; index--){
        const p = particles[index];
        p.x += p.vx;
        p.y += p.vy;
        p.life--;

        const proj = project(p.x,p.y);
        if(proj){
            ctx.fillStyle = 'rgba(180,0,0,0.7)';
            ctx.beginPath();
            ctx.arc(proj.x,canvas.height/2+80,proj.size*0.03,0,Math.PI*2);
            ctx.fill();
        }

        if(p.life <= 0){
            particles.splice(index,1);
        }
    }
}

function drawSword(){
    if(currentWeapon !== 'sword') return;

    ctx.save();

    const swing = Math.sin(swordSwing*Math.PI)*120;

    ctx.translate(canvas.width-180+swing,canvas.height-120);
    ctx.rotate(-0.9 + swing*0.003);

    ctx.fillStyle = '#4b2d16';
    ctx.fillRect(-12,70,24,100);

    ctx.fillStyle = '#c9a96d';
    ctx.fillRect(-35,55,70,12);

    const blade = ctx.createLinearGradient(-10,0,10,0);
    blade.addColorStop(0,'#666');
    blade.addColorStop(0.5,'#f0f0f0');
    blade.addColorStop(1,'#777');

    ctx.shadowColor = 'rgba(255,255,255,0.5)';
    ctx.shadowBlur = 16;

    ctx.fillStyle = blade;
    ctx.fillRect(-8,-260,16,320);

    ctx.beginPath();
    ctx.moveTo(-8,-260);
    ctx.lineTo(0,-320);
    ctx.lineTo(8,-260);
    ctx.fill();

    ctx.shadowBlur = 0;

    ctx.restore();

    swordSwing *= 0.84;
}

function drawBow(){
    if(currentWeapon !== 'bow') return;

    ctx.save();

    ctx.translate(canvas.width-170, canvas.height-160);
    ctx.rotate(-0.35);

    ctx.strokeStyle = '#5b3a1e';
    ctx.lineWidth = 10;
    ctx.beginPath();
    ctx.arc(0,0,90,-1.2,1.2);
    ctx.stroke();

    ctx.strokeStyle = '#ddd';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(30,-82);
    ctx.lineTo(30,82);
    ctx.stroke();

    // Arrow ready
    ctx.strokeStyle = '#8b5a2b';
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.moveTo(-50,0);
    ctx.lineTo(40,0);
    ctx.stroke();

    ctx.restore();
}

function drawRain(){
    ctx.strokeStyle = 'rgba(200,200,255,0.18)';

    for(let i=0;i<160;i++){
        const x = (i*93 + Date.now()/9)%canvas.width;
        const y = (i*57 + Date.now()/6)%canvas.height;

        ctx.beginPath();
        ctx.moveTo(x,y);
        ctx.lineTo(x-8,y+22);
        ctx.stroke();
    }
}

function drawFog(){
    const fog = ctx.createLinearGradient(0,0,0,canvas.height);
    fog.addColorStop(0,'rgba(40,30,20,0.03)');
    fog.addColorStop(1,'rgba(0,0,0,0.35)');

    ctx.fillStyle = fog;
    ctx.fillRect(0,0,canvas.width,canvas.height);
}

function endGame(text){
    message.style.display = 'flex';
    message.innerHTML = `${text}<span>Refresh to play again</span>`;
}

function update(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    movePlayer();

    drawSky();
    drawStars();
    drawGround();
    drawCastle();
    drawTrees();
    drawEnemies();
    drawRemotePlayers();
    updateArrows();
    drawParticles();
    // Dynamic cinematic glow
    const glow = ctx.createRadialGradient(canvas.width/2, canvas.height/2, 100, canvas.width/2, canvas.height/2, 900);
    glow.addColorStop(0,'rgba(255,180,80,0.04)');
    glow.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle = glow;
    ctx.fillRect(0,0,canvas.width,canvas.height);

    drawSword();
    drawBow();
    drawRain();
    drawFog();

    healthBar.style.width = player.health + '%';

    if(player.health > 60){
        healthBar.style.background = 'linear-gradient(to right,#00ff66,#0b7a34)';
    } else if(player.health > 30){
        healthBar.style.background = 'linear-gradient(to right,#ffb300,#cc6f00)';
    } else {
        healthBar.style.background = 'linear-gradient(to right,#ff3333,#6b0000)';
    }

    if(player.health <= 0){
        endGame('Defeat');
        return;
    }

    const alive = enemies.filter(e=>e.alive).length;

    if(alive === 0){
        endGame('Victory');
        return;
    }

    requestAnimationFrame(update);
}

update();
</script>
</body>
</html>
