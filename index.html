<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Spider Hero FP</title>
<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
  font-family: Arial, sans-serif;
}

#ui {
  position: absolute;
  top: 10px;
  left: 10px;
  color: white;
  z-index: 100;
  background: rgba(0,0,0,0.55);
  padding: 14px;
  border-radius: 14px;
  max-width: 260px;
}

#crosshair {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: white;
  font-size: 30px;
  z-index: 100;
  pointer-events: none;
}

#loading {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 28px;
  background: black;
  z-index: 200;
}

canvas {
  display: block;
}
</style>
</head>
<body>

<div id="loading">Loading Spider Hero...</div>

<div id="ui">
  <h2>🕷 Spider Hero</h2>
  <div>Click anywhere to start</div>
  <br>
  <b>Controls</b><br>
  WASD = Move<br>
  Mouse = Look Around<br>
  SPACE = Jump<br>
  SHIFT = Sprint<br>
  Hold Left Click = Web Swing
</div>

<div id="crosshair">+</div>

<script type="module">
// FIXED IMPORTS
import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
import { PointerLockControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/PointerLockControls.js?module';

const loading = document.getElementById('loading');

// SCENE
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);
scene.fog = new THREE.Fog(0x87ceeb, 50, 900);

// CAMERA
const camera = new THREE.PerspectiveCamera(
  75,
  window.innerWidth / window.innerHeight,
  0.1,
  3000
);

camera.position.set(0, 10, 0);

// RENDERER
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

// LIGHTS
const sunlight = new THREE.DirectionalLight(0xffffff, 2);
sunlight.position.set(150, 250, 100);
sunlight.castShadow = true;
scene.add(sunlight);

const ambient = new THREE.AmbientLight(0xffffff, 0.7);
scene.add(ambient);

// GROUND
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(5000, 5000),
  new THREE.MeshPhongMaterial({ color: 0x2e2e2e })
);

ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

// ROADS
const roadMaterial = new THREE.MeshPhongMaterial({ color: 0x111111 });

for(let i = -2000; i <= 2000; i += 200) {
  const road1 = new THREE.Mesh(
    new THREE.BoxGeometry(40, 0.1, 5000),
    roadMaterial
  );

  road1.position.set(i, 0.05, 0);
  scene.add(road1);

  const road2 = new THREE.Mesh(
    new THREE.BoxGeometry(5000, 0.1, 40),
    roadMaterial
  );

  road2.position.set(0, 0.05, i);
  scene.add(road2);
}

// BUILDINGS
for(let i = 0; i < 450; i++) {
  const width = 20 + Math.random() * 40;
  const height = 50 + Math.random() * 250;
  const depth = 20 + Math.random() * 40;

  const building = new THREE.Mesh(
    new THREE.BoxGeometry(width, height, depth),
    new THREE.MeshPhongMaterial({
      color: new THREE.Color(
        0.2 + Math.random() * 0.4,
        0.2 + Math.random() * 0.4,
        0.2 + Math.random() * 0.4
      )
    })
  );

  building.position.set(
    (Math.random() - 0.5) * 4000,
    height / 2,
    (Math.random() - 0.5) * 4000
  );

  building.castShadow = true;
  building.receiveShadow = true;

  scene.add(building);
}

// CONTROLS
const controls = new PointerLockControls(camera, document.body);
scene.add(controls.getObject());

window.addEventListener('click', () => {
  controls.lock();
});

controls.addEventListener('lock', () => {
  loading.style.display = 'none';
});

// INPUT
const keys = {};

window.addEventListener('keydown', (e) => {
  keys[e.code] = true;
});

window.addEventListener('keyup', (e) => {
  keys[e.code] = false;
});

// PLAYER PHYSICS
let velocityY = 0;
let onGround = false;

// WEB SWING
let swinging = false;
let swingPoint = new THREE.Vector3();

const webMaterial = new THREE.LineBasicMaterial({ color: 0xffffff });
const webGeometry = new THREE.BufferGeometry().setFromPoints([
  new THREE.Vector3(),
  new THREE.Vector3()
]);

const webLine = new THREE.Line(webGeometry, webMaterial);
webLine.visible = false;
scene.add(webLine);

window.addEventListener('mousedown', () => {
  swinging = true;

  const direction = new THREE.Vector3();
  camera.getWorldDirection(direction);

  swingPoint.copy(camera.position)
    .add(direction.multiplyScalar(120));

  swingPoint.y += 70;

  webLine.visible = true;
});

window.addEventListener('mouseup', () => {
  swinging = false;
  webLine.visible = false;
});

// MOVEMENT
function updateMovement() {
  const moveSpeed = keys['ShiftLeft'] ? 1.8 : 1.0;

  if(keys['KeyW']) controls.moveForward(moveSpeed);
  if(keys['KeyS']) controls.moveForward(-moveSpeed);
  if(keys['KeyA']) controls.moveRight(-moveSpeed);
  if(keys['KeyD']) controls.moveRight(moveSpeed);

  // GRAVITY
  velocityY -= 0.02;
  camera.position.y += velocityY;

  // FLOOR COLLISION
  if(camera.position.y <= 10) {
    camera.position.y = 10;
    velocityY = 0;
    onGround = true;
  }

  // JUMP
  if(keys['Space'] && onGround) {
    velocityY = 0.45;
    onGround = false;
  }

  // SWINGING
  if(swinging) {
    const pullDirection = new THREE.Vector3()
      .subVectors(swingPoint, camera.position)
      .normalize();

    camera.position.add(pullDirection.multiplyScalar(2.4));

    webGeometry.setFromPoints([
      camera.position.clone(),
      swingPoint.clone()
    ]);
  }
}

// ANIMATION
function animate() {
  requestAnimationFrame(animate);

  updateMovement();

  renderer.render(scene, camera);
}

animate();

// RESIZE
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// BASIC SELF TESTS
console.assert(scene instanceof THREE.Scene, 'Scene failed to create');
console.assert(camera instanceof THREE.PerspectiveCamera, 'Camera failed');
console.assert(renderer instanceof THREE.WebGLRenderer, 'Renderer failed');
console.assert(controls instanceof PointerLockControls, 'Controls failed');

console.log('Spider Hero loaded successfully');
</script>

</body>
</html>
